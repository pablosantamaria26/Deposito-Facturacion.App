<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mercado Limpio - Distribuidora</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    padding: 40px 36px 36px;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .logo-wrap {
    width: 150px;
    height: 150px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-placeholder { font-size: 64px; line-height: 1; }

  .title {
    font-size: 22px;
    font-weight: 900;
    color: #0f172a;
    text-align: center;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: #64748b;
    text-align: center;
    margin-top: -14px;
  }

  .btns {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .btn-app {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 24px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    font-size: 18px;
    font-weight: 800;
    text-decoration: none;
    transition: transform .12s ease, box-shadow .12s ease;
    min-height: 72px;
  }

  .btn-app:active { transform: scale(0.97); }

  .btn-deposito {
    background: #0f172a;
    color: #ffffff;
    box-shadow: 0 4px 16px rgba(15,23,42,0.20);
  }
  .btn-deposito:hover { box-shadow: 0 6px 24px rgba(15,23,42,0.28); }

  .btn-facturacion {
    background: #1d4ed8;
    color: #ffffff;
    box-shadow: 0 4px 16px rgba(29,78,216,0.25);
  }
  .btn-facturacion:hover { box-shadow: 0 6px 24px rgba(29,78,216,0.35); }

  .btn-icon { font-size: 32px; line-height: 1; flex-shrink: 0; }
  .btn-text { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .btn-label { font-size: 18px; font-weight: 900; letter-spacing: .3px; }
  .btn-desc { font-size: 12px; font-weight: 400; opacity: 0.75; }

  /* ── STATS PANEL ── */
  .stats-panel {
    width: 100%;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 16px;
    padding: 16px;
  }

  .stats-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .stats-title {
    font-size: 12px;
    font-weight: 900;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  .stats-week {
    font-size: 11px;
    color: #94a3b8;
    font-weight: 600;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat-box {
    background: #ffffff;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-icon { font-size: 18px; line-height: 1; }

  .stat-value {
    font-size: 17px;
    font-weight: 900;
    color: #0f172a;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  .stat-box.rapido { border-color: #86efac; background: #f0fdf4; }
  .stat-box.rapido .stat-value { color: #16a34a; }

  .stat-box.lento { border-color: #fca5a5; background: #fef2f2; }
  .stat-box.lento .stat-value { color: #dc2626; }

  .stats-sub {
    margin-top: 10px;
    font-size: 11px;
    color: #94a3b8;
    text-align: center;
    font-weight: 600;
  }

  .stats-loading {
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    padding: 12px 0;
  }

  /* Status badge */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #64748b;
    font-weight: 500;
  }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
  .status-dot.offline { background: #ef4444; }

  /* Redirect */
  .redirect-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: #475569;
    font-size: 15px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: #1d4ed8;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .redirect-name { font-size: 18px; font-weight: 800; color: #0f172a; }
</style>
</head>
<body>

<!-- REDIRECT SCREEN -->
<div class="redirect-screen" id="redirectScreen">
  <div class="spinner"></div>
  <div class="redirect-name" id="redirectName"></div>
  <div>Redirigiendo...</div>
</div>

<!-- SELECTION CARD -->
<div class="card" id="selectionCard" style="display:none;">

  <div class="logo-wrap">
    <img src="./logo.jpeg" alt="Mercado Limpio"
      onerror="this.parentElement.innerHTML='<div class=\'logo-placeholder\'>🛒</div>'" />
  </div>

  <div class="title">Mercado Limpio<br>Distribuidora</div>
  <div class="subtitle">Seleccioná tu aplicación</div>

  <div class="btns">
    <a class="btn-app btn-deposito" href="./deposito.html" onclick="setApp('deposito')">
      <span class="btn-icon">📦</span>
      <span class="btn-text">
        <span class="btn-label">DEPÓSITO</span>
        <span class="btn-desc">Armar y gestionar pedidos</span>
      </span>
    </a>
    <a class="btn-app btn-facturacion" href="./facturacion.html" onclick="setApp('facturacion')">
      <span class="btn-icon">💰</span>
      <span class="btn-text">
        <span class="btn-label">FACTURACIÓN</span>
        <span class="btn-desc">Facturar y gestionar clientes</span>
      </span>
    </a>
  </div>

  <!-- STATS PANEL -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-header">
      <span class="stats-title">⏱ Tiempos de armado</span>
      <span class="stats-week" id="statsWeekLabel"></span>
    </div>
    <div id="statsContent">
      <div class="stats-loading">Cargando estadísticas...</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Conectado</span>
  </div>

</div>

<script>
  const SB_URL  = "https://gjeyvbidomxzofcdycya.supabase.co";
  const SB_ANON = "sb_publishable_CjdA8GwtCljm_PzT8pqk3g_QIhTmUHT";

  // ── ISO WEEK ──
  function weekId(date) {
    const d = new Date(date);
    d.setHours(0,0,0,0);
    const day = d.getDay() || 7;
    d.setDate(d.getDate() + 4 - day);
    const y = d.getFullYear();
    const start = new Date(y, 0, 1);
    return y * 100 + Math.ceil((((d - start) / 86400000) + 1) / 7);
  }

  function getWeekStart() {
    const now = new Date();
    const day = now.getDay() || 7;
    const mon = new Date(now);
    mon.setDate(now.getDate() - (day - 1));
    mon.setHours(0, 0, 0, 0);
    return mon.toISOString();
  }

  function fmtMin(secs) {
    if (secs === null || secs === undefined) return "—";
    if (secs < 60)  return secs + "s";
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }

  // ── SUPABASE ──
  async function sbGet(params) {
    const r = await fetch(`${SB_URL}/rest/v1/pedidos?${params}`, {
      headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` }
    });
    return r.ok ? r.json() : [];
  }

  // ── CALCULAR PROMEDIOS ──
  async function calcularPromediosVendedores() {
    const weekStart = getWeekStart();
    const pedidos = await sbGet(
      `estado=eq.armado&armado_at=not.is.null&created_at=gte.${encodeURIComponent(weekStart)}&select=created_at,armado_at,cliente_nombre,armado_por&limit=200`
    );

    if (!pedidos.length) return null;

    // Filtrar los que tienen ambas fechas válidas y calcular segundos
    const tiempos = pedidos
      .map(p => {
        const start = new Date(p.created_at).getTime();
        const end   = new Date(p.armado_at).getTime();
        const diff  = Math.round((end - start) / 1000);
        return diff > 0 ? { secs: diff, nombre: p.cliente_nombre, armador: p.armado_por } : null;
      })
      .filter(Boolean);

    if (!tiempos.length) return null;

    const total   = tiempos.reduce((acc, t) => acc + t.secs, 0);
    const promedio = Math.round(total / tiempos.length);
    const rapido  = tiempos.reduce((a, b) => a.secs < b.secs ? a : b);
    const lento   = tiempos.reduce((a, b) => a.secs > b.secs ? a : b);

    return { promedio, rapido, lento, total: tiempos.length };
  }

  // ── RENDER ESTADÍSTICAS ──
  async function renderEstadisticasVendedores() {
    const content = document.getElementById("statsContent");

    // Week label
    const now = new Date();
    const weekLabel = `Semana ${weekId(now)}`;
    document.getElementById("statsWeekLabel").textContent = weekLabel;

    try {
      const stats = await calcularPromediosVendedores();

      if (!stats) {
        content.innerHTML = `<div class="stats-loading">Sin pedidos armados esta semana aún</div>`;
        return;
      }

      content.innerHTML = `
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-icon">⏱</div>
            <div class="stat-value">${fmtMin(stats.promedio)}</div>
            <div class="stat-label">Promedio</div>
          </div>
          <div class="stat-box rapido">
            <div class="stat-icon">⚡</div>
            <div class="stat-value">${fmtMin(stats.rapido.secs)}</div>
            <div class="stat-label">Más rápido</div>
          </div>
          <div class="stat-box lento">
            <div class="stat-icon">🐢</div>
            <div class="stat-value">${fmtMin(stats.lento.secs)}</div>
            <div class="stat-label">Más lento</div>
          </div>
        </div>
        <div class="stats-sub">${stats.total} pedido${stats.total !== 1 ? "s" : ""} armado${stats.total !== 1 ? "s" : ""} esta semana</div>
      `;
    } catch(e) {
      content.innerHTML = `<div class="stats-loading">Sin datos disponibles</div>`;
    }
  }

  // ── INIT ──
  function setApp(type) {
    localStorage.setItem("app_type", type);
  }

  function init() {
    function updateStatus() {
      const dot = document.getElementById("statusDot");
      const txt = document.getElementById("statusText");
      if (navigator.onLine) {
        dot.classList.remove("offline");
        txt.textContent = "Conectado";
      } else {
        dot.classList.add("offline");
        txt.textContent = "Sin conexión";
      }
    }
    window.addEventListener("online", updateStatus);
    window.addEventListener("offline", updateStatus);
    updateStatus();

    const savedApp = localStorage.getItem("app_type");
    if (savedApp === "deposito" || savedApp === "facturacion") {
      const dest = savedApp === "deposito" ? "./deposito.html" : "./facturacion.html";
      const name = savedApp === "deposito" ? "📦 Depósito" : "💰 Facturación";
      document.getElementById("redirectName").textContent = name;
      document.getElementById("redirectScreen").style.display = "flex";
      setTimeout(() => { window.location.replace(dest); }, 600);
    } else {
      document.getElementById("selectionCard").style.display = "flex";
      renderEstadisticasVendedores();
    }
  }

  init();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  }
</script>
</body>
</html>
