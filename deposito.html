<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Depósito ML</title>
  <meta name="theme-color" content="#ffffff" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --hoy:      #dc2626;
    --hoy-bg:   #fef2f2;
    --hoy-brd:  #fca5a5;
    --pend:     #2563eb;
    --pend-bg:  #eff6ff;
    --pend-brd: #93c5fd;
    --success:  #16a34a;
    --succ-bg:  #f0fdf4;
    --danger:   #dc2626;
    --warn:     #d97706;
    --bg:       #f8fafc;
    --card:     #ffffff;
    --text:     #0f172a;
    --muted:    #64748b;
    --border:   #e2e8f0;
    --radius:   16px;
    --shadow:   0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: none; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 24px;
    background: #fff; padding: 32px;
  }
  .login-icon { font-size: 64px; }
  .login-title { font-size: 32px; font-weight: 900; color: var(--text); }
  .login-sub   { font-size: 16px; color: var(--muted); }
  .btn-login {
    width: 240px; padding: 20px; border-radius: var(--radius);
    border: none; font-size: 22px; font-weight: 900; cursor: pointer;
    transition: 0.15s; box-shadow: var(--shadow);
  }
  .btn-login.a { background: var(--warn); color: #fff; }
  .btn-login.c { background: var(--pend); color: #fff; margin-top: 8px; }
  .btn-login:active { transform: scale(0.97); }

  /* ── APP ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-title { font-size: 22px; font-weight: 900; flex: 1; color: var(--text); }
  .user-badge {
    background: var(--warn); color: #fff;
    padding: 8px 18px; border-radius: 99px;
    font-size: 16px; font-weight: 900;
  }
  .conn-dot { width: 12px; height: 12px; border-radius: 50%; background: #dc2626; flex-shrink: 0; }
  .conn-dot.online  { background: var(--success); box-shadow: 0 0 0 3px #bbf7d0; }
  .conn-dot.syncing { background: var(--warn); animation: pulse 1s infinite; }

  /* ── TABS ── */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: #fff; border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 18px 10px; font-size: 16px; font-weight: 800;
    border: none; background: transparent; cursor: pointer;
    color: var(--muted); border-bottom: 4px solid transparent;
    transition: 0.15s; text-align: center; line-height: 1.2;
  }
  .tab-btn.hoy.active   { color: var(--hoy); border-bottom-color: var(--hoy); background: var(--hoy-bg); }
  .tab-btn.pend.active  { color: var(--pend); border-bottom-color: var(--pend); background: var(--pend-bg); }
  .tab-count {
    display: inline-block; margin-left: 6px;
    background: currentColor; color: #fff;
    border-radius: 99px; font-size: 12px; font-weight: 900;
    padding: 2px 8px; vertical-align: middle;
    opacity: 0.9;
  }

  /* ── LISTA ── */
  #listaPedidos { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; }

  .pedido-card {
    background: var(--card); border-radius: var(--radius);
    border: 2px solid var(--border); box-shadow: var(--shadow);
    padding: 18px 20px; cursor: pointer; transition: 0.15s;
    position: relative; overflow: hidden;
  }
  .pedido-card:active { transform: scale(0.99); }
  .pedido-card.urgente {
    border-color: var(--hoy-brd); background: var(--hoy-bg);
    border-left: 6px solid var(--hoy);
  }
  .pedido-card.pendiente-card {
    border-color: var(--pend-brd); background: var(--pend-bg);
    border-left: 6px solid var(--pend);
  }
  .pedido-card.armado {
    border-color: #86efac; background: var(--succ-bg);
    border-left: 6px solid var(--success); opacity: 0.75;
  }

  .card-cliente { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1.2; }
  .card-entrega {
    font-size: 16px; font-weight: 700; margin-top: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-entrega.hoy-label  { color: var(--hoy); }
  .card-entrega.pend-label { color: var(--pend); }
  .card-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .card-progress { margin-top: 10px; height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; }
  .card-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .badge-armado {
    position: absolute; top: 16px; right: 16px;
    background: var(--success); color: #fff;
    padding: 4px 12px; border-radius: 99px;
    font-size: 13px; font-weight: 800;
  }

  /* ── DETALLE ── */
  #vistaDetalle {
    display: none; flex-direction: column; min-height: 100vh;
    background: var(--bg);
  }
  .det-header {
    position: sticky; top: 0; z-index: 100;
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .btn-back {
    background: var(--bg); border: 2px solid var(--border);
    color: var(--text); padding: 10px 18px; border-radius: 99px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .det-title { font-size: 20px; font-weight: 900; flex: 1; }

  .det-info {
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 18px 20px;
  }
  .det-cliente { font-size: 28px; font-weight: 900; color: var(--text); }
  .det-entrega {
    font-size: 20px; font-weight: 800; margin-top: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .det-entrega.urgente { color: var(--hoy); }
  .det-entrega.normal  { color: var(--pend); }
  .det-sub { font-size: 15px; color: var(--muted); margin-top: 4px; }

  /* ── ITEMS ── */
  #listaItems { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }

  .item-row {
    background: #fff; border: 2px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: grid; grid-template-columns: 60px 1fr auto;
    align-items: center; gap: 14px; transition: 0.15s;
    box-shadow: var(--shadow);
  }
  .item-row.armado {
    border-color: #86efac; background: var(--succ-bg);
  }

  .check-btn {
    width: 54px; height: 54px; border-radius: 14px;
    border: 3px solid var(--border); background: #fff;
    font-size: 26px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.15s; flex-shrink: 0;
  }
  .check-btn.on {
    background: var(--success); border-color: var(--success); color: #fff;
  }
  .check-btn:active { transform: scale(0.88); }

  .item-desc { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .item-desc.tachado { text-decoration: line-through; color: var(--muted); }
  .item-qty {
    background: var(--bg); border: 2px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-size: 22px; font-weight: 900; color: var(--text);
    text-align: center; min-width: 60px;
  }

  /* ── FOOTER ── */
  .det-footer {
    position: sticky; bottom: 0; background: #fff;
    border-top: 2px solid var(--border);
    padding: 16px 18px; box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .progreso {
    font-size: 15px; font-weight: 700; color: var(--muted);
    text-align: center; margin-bottom: 12px;
  }
  .btn-armar {
    width: 100%; padding: 20px; border-radius: var(--radius);
    border: none; font-size: 20px; font-weight: 900;
    background: var(--success); color: #fff; cursor: pointer;
    transition: 0.15s; letter-spacing: 0.3px; box-shadow: 0 4px 12px rgba(22,163,74,0.35);
  }
  .btn-armar:disabled {
    background: #d1fae5; color: #6ee7b7; cursor: not-allowed;
    box-shadow: none;
  }
  .btn-armar:not(:disabled):active { transform: scale(0.98); }

  /* ── MODAL CONFIRMAR DESTILDAR ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 8000; backdrop-filter: blur(2px);
  }
  .modal-box {
    background: #fff; border-radius: 24px 24px 0 0;
    padding: 28px 24px 36px; width: 100%; max-width: 480px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .modal-item  { font-size: 18px; font-weight: 700; color: var(--danger); margin-bottom: 6px; }
  .modal-sub   { font-size: 15px; color: var(--muted); margin-bottom: 24px; line-height: 1.4; }
  .modal-btns  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-btn {
    padding: 18px; border-radius: var(--radius); font-size: 17px;
    font-weight: 800; border: none; cursor: pointer; transition: 0.15s;
  }
  .modal-btn.cancel { background: var(--bg); border: 2px solid var(--border); color: var(--muted); }
  .modal-btn.confirm { background: var(--danger); color: #fff; }
  .modal-btn:active { transform: scale(0.97); }

  /* ── LOADER / TOAST ── */
  #loader {
    position: fixed; inset: 0; background: rgba(255,255,255,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
  }
  .spinner { width: 48px; height: 48px; border: 5px solid #e2e8f0; border-top-color: var(--warn); border-radius: 50%; animation: spin 0.7s linear infinite; }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 14px 28px;
    border-radius: 99px; font-size: 16px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 7000;
    white-space: nowrap; animation: fadeUp 0.3s ease;
  }
  .toast.error { background: var(--danger); }
  .toast.ok    { background: var(--success); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 56px; margin-bottom: 12px; }
  .empty p { font-size: 18px; font-weight: 600; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes fadeUp  { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div style="font-size:17px;font-weight:700;color:#64748b;">Cargando...</div></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-icon">📦</div>
  <div class="login-title">Depósito ML</div>
  <div class="login-sub">Identificate para continuar</div>
  <button class="btn-login a" onclick="login('A')">Soy A</button>
  <button class="btn-login c" onclick="login('C')">Soy C</button>
</div>

<!-- APP -->
<div id="app">

  <!-- Vista: Lista de pedidos -->
  <div id="vistaLista" style="display:flex;flex-direction:column;min-height:100vh;">
    <div class="header">
      <div class="conn-dot" id="connDot"></div>
      <div class="header-title">📦 Depósito</div>
      <div id="userBadge" class="user-badge">A</div>
    </div>

    <div class="tabs">
      <button class="tab-btn hoy active" id="tabHoy" onclick="setTab('hoy')">
        🔴 HOY<br><span style="font-size:13px;font-weight:600;">Para esta semana</span>
      </button>
      <button class="tab-btn pend" id="tabPend" onclick="setTab('pendientes')">
        🔵 PENDIENTES<br><span style="font-size:13px;font-weight:600;">Próxima semana+</span>
      </button>
    </div>

    <div id="listaPedidos"></div>
  </div>

  <!-- Vista: Detalle del pedido -->
  <div id="vistaDetalle">
    <div class="det-header">
      <button class="btn-back" onclick="volverALista()">← Volver</button>
      <div class="det-title" id="detTitle">Pedido</div>
      <div id="detBadge" style="font-size:14px;font-weight:800;color:var(--muted);"></div>
    </div>
    <div class="det-info">
      <div class="det-cliente" id="detCliente">—</div>
      <div class="det-entrega" id="detEntrega">—</div>
      <div class="det-sub" id="detSub">—</div>
    </div>
    <div id="listaItems"></div>
    <div class="det-footer">
      <div class="progreso" id="progresoTexto">0 / 0 items</div>
      <button class="btn-armar" id="btnArmar" disabled onclick="completarPedido()">
        ✅ MARCAR COMO ARMADO
      </button>
    </div>
  </div>
</div>

<!-- MODAL DESTILDAR -->
<div class="modal-overlay" id="modalDestildar">
  <div class="modal-box">
    <div class="modal-title">⚠️ ¿Destildar este artículo?</div>
    <div class="modal-item" id="modalItemNombre"></div>
    <div class="modal-sub">Va a quedar marcado como <strong style="color:var(--danger)">faltante</strong> en facturación.</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn confirm" onclick="confirmarDestildar()">Sí, destildar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL  = "https://gjeyvbidomxzofcdycya.supabase.co";
const SUPABASE_ANON = "sb_publishable_CjdA8GwtCljm_PzT8pqk3g_QIhTmUHT";

let currentUser    = null;
let tabActual      = "hoy";
let pedidoActivo   = null;
let itemsActivos   = [];
let pedidosCache   = [];
let confirmPending = null;

// ── FECHA VIERNES DE ESTA SEMANA ──
function viernesEstaSemana() {
  const hoy = new Date();
  const diff = 5 - hoy.getDay(); // días hasta viernes
  const v = new Date(hoy);
  v.setDate(hoy.getDate() + (diff >= 0 ? diff : diff + 7));
  v.setHours(23, 59, 59, 999);
  return v;
}

function esUrgente(fechaEntregaISO) {
  if (!fechaEntregaISO) return true;
  const fe = new Date(fechaEntregaISO + "T23:59:59");
  return fe <= viernesEstaSemana();
}

// ── SUPABASE ──
async function sbGet(table, params = "") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  return r.ok ? r.json() : [];
}
async function sbPatch(table, match, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=representation"
    },
    body: JSON.stringify(data)
  });
  return r.ok ? r.json() : null;
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=minimal"
    },
    body: JSON.stringify(data)
  });
  return r.ok;
}

// ── REALTIME ──
function conectarRealtime() {
  const ws = new WebSocket(
    `${SUPABASE_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`
  );
  let hb;
  ws.onopen = () => {
    setConn("online");
    ws.send(JSON.stringify({ topic:"realtime:public:pedidos", event:"phx_join",
      payload:{ config:{ postgres_changes:[{ event:"*", schema:"public", table:"pedidos" }] } }, ref:"1" }));
    hb = setInterval(() => ws.readyState===1 && ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:"hb" })), 20000);
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.payload?.data?.table === "pedidos") cargarPedidos();
    } catch(_) {}
  };
  ws.onclose = () => { setConn("offline"); clearInterval(hb); setTimeout(conectarRealtime, 3000); };
  ws.onerror = () => setConn("offline");
}
function setConn(s) {
  const d = document.getElementById("connDot");
  if (d) d.className = "conn-dot " + s;
}

// ── LOGIN ──
function login(user) {
  currentUser = user;
  localStorage.setItem("depositoUser", user);
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("userBadge").textContent = user;
  iniciarApp();
}

// ── CARGA ──
async function cargarPedidos() {
  setConn("syncing");
  try {
    pedidosCache = await sbGet("pedidos",
      "estado=in.(pendiente,armado)&order=fecha_entrega.asc,created_at.asc&limit=200");
    renderLista();
    setConn("online");
  } catch(e) { setConn("offline"); }
}

// ── TABS ──
function setTab(tab) {
  tabActual = tab;
  document.getElementById("tabHoy").classList.toggle("active", tab === "hoy");
  document.getElementById("tabPend").classList.toggle("active", tab === "pendientes");
  renderLista();
}

// ── RENDER LISTA ──
function renderLista() {
  const viernes = viernesEstaSemana();
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  const filtrados = pedidosCache.filter(p => {
    const fe = p.fecha_entrega ? new Date(p.fecha_entrega + "T23:59:59") : new Date();
    return tabActual === "hoy" ? fe <= viernes : fe > viernes;
  });

  // Contadores para tabs
  const countHoy  = pedidosCache.filter(p => { const fe = p.fecha_entrega ? new Date(p.fecha_entrega+"T23:59:59") : new Date(); return fe <= viernes; }).length;
  const countPend = pedidosCache.filter(p => { const fe = p.fecha_entrega ? new Date(p.fecha_entrega+"T23:59:59") : new Date(); return fe > viernes; }).length;
  document.getElementById("tabHoy").innerHTML  = `🔴 HOY<br><span style="font-size:13px;font-weight:600;">Esta semana (${countHoy})</span>`;
  document.getElementById("tabPend").innerHTML = `🔵 PENDIENTES<br><span style="font-size:13px;font-weight:600;">Próxima semana+ (${countPend})</span>`;

  const box = document.getElementById("listaPedidos");
  if (!filtrados.length) {
    box.innerHTML = `<div class="empty"><div class="icon">${tabActual==="hoy"?"📭":"🗓️"}</div><p>No hay pedidos ${tabActual==="hoy"?"para esta semana":"pendientes"}.</p></div>`;
    return;
  }

  box.innerHTML = filtrados.map(p => {
    const fe = p.fecha_entrega ? new Date(p.fecha_entrega + "T12:00:00") : null;
    const feStr = fe ? fe.toLocaleDateString("es-AR", { weekday:"long", day:"2-digit", month:"2-digit", year:"numeric" }) : "—";
    const urgente = esUrgente(p.fecha_entrega);
    const cardClass = p.estado === "armado" ? "armado" : urgente ? "urgente" : "pendiente-card";
    const labelClass = urgente ? "hoy-label" : "pend-label";
    const icon = urgente ? "🔴" : "🔵";

    return `
      <div class="pedido-card ${cardClass}" onclick="abrirPedido('${p.id}')">
        ${p.estado === "armado" ? `<div class="badge-armado">✅ ARMADO</div>` : ""}
        <div class="card-cliente">${p.cliente_nombre || "Cliente " + (p.cliente_id || "—")}</div>
        <div class="card-entrega ${labelClass}">${icon} SE ENTREGA: ${feStr.toUpperCase()}</div>
        <div class="card-meta">Vendedor: ${p.vendedor || "—"} · ${p.observaciones || "Sin obs."}</div>
      </div>`;
  }).join("");
}

// ── DETALLE ──
async function abrirPedido(id) {
  showLoader();
  try {
    const [ps, items] = await Promise.all([
      sbGet("pedidos", `id=eq.${id}`),
      sbGet("items_pedido", `pedido_id=eq.${id}&order=id.asc`)
    ]);
    pedidoActivo = ps[0];
    itemsActivos = items;

    const fe = pedidoActivo.fecha_entrega;
    const feDate = fe ? new Date(fe + "T12:00:00") : null;
    const feStr = feDate ? feDate.toLocaleDateString("es-AR", { weekday:"long", day:"2-digit", month:"2-digit", year:"numeric" }) : "—";
    const urgente = esUrgente(fe);

    document.getElementById("detTitle").textContent =
      pedidoActivo.cliente_nombre || "Cliente " + (pedidoActivo.cliente_id || "—");
    document.getElementById("detCliente").textContent =
      pedidoActivo.cliente_nombre || "Cliente " + (pedidoActivo.cliente_id || "—");
    document.getElementById("detEntrega").textContent = `${urgente ? "🔴" : "🔵"} SE ENTREGA: ${feStr.toUpperCase()}`;
    document.getElementById("detEntrega").className = `det-entrega ${urgente ? "urgente" : "normal"}`;
    document.getElementById("detSub").textContent =
      `Vendedor: ${pedidoActivo.vendedor || "—"} · ${pedidoActivo.observaciones || "Sin observaciones"}`;
    document.getElementById("detBadge").textContent =
      pedidoActivo.estado === "armado" ? "✅ ARMADO" : "";

    renderItems();

    document.getElementById("vistaLista").style.display = "none";
    document.getElementById("vistaDetalle").style.display = "flex";
    document.getElementById("vistaDetalle").style.flexDirection = "column";
  } catch(e) { toast("Error al cargar pedido", "error"); }
  finally { hideLoader(); }
}

function renderItems() {
  const box = document.getElementById("listaItems");
  box.innerHTML = itemsActivos.map((item, i) => `
    <div class="item-row ${item.armado ? "armado" : ""}" id="irow-${item.id}">
      <button class="check-btn ${item.armado ? "on" : ""}"
        onclick="toggleItem('${item.id}', ${i}, ${!item.armado})">
        ${item.armado ? "✓" : ""}
      </button>
      <div class="item-desc ${item.armado ? "tachado" : ""}" id="idesc-${item.id}">
        ${item.descripcion}
      </div>
      <div class="item-qty">${item.cantidad}</div>
    </div>
  `).join("");
  actualizarProgreso();
}

// ── TOGGLE ITEM ──
async function toggleItem(itemId, idx, nuevoEstado) {
  if (!nuevoEstado && itemsActivos[idx].armado) {
    // Destildar → confirmar
    confirmPending = { itemId, idx };
    document.getElementById("modalItemNombre").textContent = itemsActivos[idx].descripcion;
    document.getElementById("modalDestildar").style.display = "flex";
    return;
  }
  await aplicarToggle(itemId, idx, true);
}

function cerrarModal() {
  confirmPending = null;
  document.getElementById("modalDestildar").style.display = "none";
}

async function confirmarDestildar() {
  if (!confirmPending) return;
  const { itemId, idx } = confirmPending;
  cerrarModal();
  await aplicarToggle(itemId, idx, false);
}

async function aplicarToggle(itemId, idx, nuevoEstado) {
  itemsActivos[idx].armado = nuevoEstado;

  const row  = document.getElementById(`irow-${itemId}`);
  const btn  = row.querySelector(".check-btn");
  const desc = document.getElementById(`idesc-${itemId}`);

  if (nuevoEstado) {
    row.classList.add("armado"); btn.classList.add("on"); btn.textContent = "✓"; desc.classList.add("tachado");
  } else {
    row.classList.remove("armado"); btn.classList.remove("on"); btn.textContent = ""; desc.classList.remove("tachado");
  }
  actualizarProgreso();

  try {
    const now = new Date().toISOString();
    await sbPatch("items_pedido", `id=eq.${itemId}`, {
      armado: nuevoEstado,
      armado_por: nuevoEstado ? currentUser : null,
      armado_at:  nuevoEstado ? now : null,
    });
  } catch(e) { toast("Error al guardar", "error"); }
}

// ── PROGRESO ──
function actualizarProgreso() {
  const total    = itemsActivos.length;
  const armados  = itemsActivos.filter(i => i.armado).length;
  const faltantes = total - armados;
  const btn = document.getElementById("btnArmar");

  let txt = `${armados} / ${total} items armados`;
  if (faltantes > 0 && armados > 0) txt += ` · ${faltantes} irán como faltante${faltantes > 1 ? "s" : ""}`;
  document.getElementById("progresoTexto").textContent = txt;

  if (pedidoActivo?.estado === "armado") {
    btn.disabled = true;
    btn.textContent = "✅ YA ESTÁ ARMADO";
  } else {
    btn.disabled = armados === 0;
    btn.textContent = faltantes > 0 && armados > 0
      ? `✅ ARMAR (${faltantes} faltante${faltantes > 1 ? "s" : ""})`
      : "✅ MARCAR COMO ARMADO";
  }
}

// ── COMPLETAR PEDIDO ──
async function completarPedido() {
  if (!pedidoActivo || pedidoActivo.estado === "armado") return;
  showLoader();
  try {
    const faltantes = itemsActivos.filter(i => !i.armado);

    // Marcar faltantes en Supabase
    if (faltantes.length) {
      await Promise.all(faltantes.map(item =>
        sbPatch("items_pedido", `id=eq.${item.id}`, { es_faltante: true })
      ));
    }

    await sbPatch("pedidos", `id=eq.${pedidoActivo.id}`, { estado: "armado" });
    await sbInsert("auditoria", {
      pedido_id: pedidoActivo.id, accion: "pedido_armado", usuario: currentUser,
      detalle: { armados: itemsActivos.filter(i => i.armado).length, faltantes: faltantes.length }
    });

    pedidoActivo.estado = "armado";
    actualizarProgreso();

    const msg = faltantes.length
      ? `✅ Armado con ${faltantes.length} faltante${faltantes.length>1?"s":""}!`
      : "✅ ¡Pedido armado completo!";
    toast(msg, "ok");
    setTimeout(volverALista, 1400);
  } catch(e) { toast("Error al guardar", "error"); }
  finally { hideLoader(); }
}

// ── NAV ──
function volverALista() {
  pedidoActivo = null;
  document.getElementById("vistaDetalle").style.display = "none";
  document.getElementById("vistaLista").style.display  = "flex";
  document.getElementById("vistaLista").style.flexDirection = "column";
  document.getElementById("vistaLista").style.minHeight = "100vh";
  cargarPedidos();
}

// ── UTILS ──
function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }

let toastTimer;
function toast(msg, tipo = "ok") {
  const old = document.querySelector(".toast"); if (old) old.remove();
  const el = document.createElement("div");
  el.className = `toast ${tipo}`;
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 2800);
}

// ── INIT ──
function iniciarApp() {
  cargarPedidos();
  conectarRealtime();
  setInterval(cargarPedidos, 30000);
}

window.onload = () => {
  hideLoader();
  const saved = localStorage.getItem("depositoUser");
  if (saved) { login(saved); }
  else { document.getElementById("loginScreen").style.display = "flex"; }
};
</script>
