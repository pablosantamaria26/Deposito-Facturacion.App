<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Depósito ML</title>
  <meta name="theme-color" content="#0f172a" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #f59e0b;
    --primary-dark: #d97706;
    --primary-dim: rgba(245, 158, 11, 0.15);
    --bg: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.9);
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(148, 163, 184, 0.15);
    --success: #10b981;
    --danger: #ef4444;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* LOGIN */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 20px;
    background: radial-gradient(circle at center, #1e293b, #0f172a);
    padding: 20px;
  }
  #loginScreen h1 { font-size: 28px; font-weight: 900; color: var(--primary); }
  #loginScreen p { color: var(--muted); font-size: 14px; text-align: center; }
  .btn-login {
    background: var(--primary); color: #000; border: none;
    padding: 18px 40px; border-radius: var(--radius); font-size: 20px;
    font-weight: 900; cursor: pointer; width: 200px; transition: 0.2s;
  }
  .btn-login:active { transform: scale(0.97); }

  /* APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,0.97); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .header-title { font-size: 18px; font-weight: 900; flex: 1; }
  .header-user {
    background: var(--primary); color: #000;
    padding: 6px 14px; border-radius: 99px; font-weight: 900; font-size: 14px;
  }
  .conn-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--danger); transition: 0.3s; flex-shrink: 0;
  }
  .conn-dot.online { background: var(--success); box-shadow: 0 0 8px rgba(16,185,129,0.5); }
  .conn-dot.syncing { background: var(--primary); animation: pulse 1s infinite; }

  /* FILTROS */
  .filters {
    display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
    scrollbar-width: none; background: rgba(15,23,42,0.5);
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--muted); padding: 8px 16px; border-radius: 99px;
    font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer;
    flex-shrink: 0; transition: 0.2s;
  }
  .filter-btn.active {
    background: var(--primary-dim); border-color: var(--primary); color: var(--primary);
  }

  /* LISTA PEDIDOS */
  #listaPedidos {
    padding: 12px 16px; display: flex; flex-direction: column; gap: 10px;
    flex: 1;
  }

  .pedido-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    cursor: pointer; transition: 0.15s; position: relative;
    border-left: 4px solid var(--border);
  }
  .pedido-card:active { transform: scale(0.99); }
  .pedido-card.estado-pendiente  { border-left-color: var(--muted); }
  .pedido-card.estado-armado     { border-left-color: var(--success); }
  .pedido-card.activo            { border-color: var(--primary); background: rgba(245,158,11,0.08); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-nombre { font-size: 16px; font-weight: 700; }
  .card-num { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .estado-badge {
    font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-pendiente  { background: rgba(148,163,184,0.15); color: var(--muted); }
  .badge-armado     { background: rgba(16,185,129,0.15); color: var(--success); }
  .badge-facturado  { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .card-meta {
    margin-top: 8px; display: flex; gap: 12px; font-size: 11px; color: var(--muted);
  }
  .progress-bar {
    margin-top: 8px; height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--primary); transition: width 0.4s; }

  /* PANEL DETALLE */
  #detalle {
    display: none; flex-direction: column;
    background: var(--bg); min-height: 100vh;
  }
  .detalle-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,0.97); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  .btn-back {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 99px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .detalle-title { font-size: 16px; font-weight: 900; flex: 1; }
  .detalle-info {
    padding: 14px 16px; background: rgba(30,41,59,0.5);
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .info-item { font-size: 12px; }
  .info-item span { color: var(--muted); display: block; }
  .info-item strong { color: var(--text); font-size: 14px; }

  #listaItems { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .item-row {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    display: grid; grid-template-columns: 44px 1fr auto;
    align-items: center; gap: 10px; transition: 0.2s;
  }
  .item-row.armado {
    border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06);
  }

  .item-check-btn {
    width: 44px; height: 44px; border-radius: 12px;
    border: 2px solid var(--border); background: transparent;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0;
  }
  .item-check-btn.checked {
    background: var(--success); border-color: var(--success); color: white;
  }
  .item-check-btn:active { transform: scale(0.9); }

  .item-desc { font-size: 15px; font-weight: 500; line-height: 1.3; }
  .item-desc.tachado { text-decoration: line-through; color: var(--muted); }
  .item-qty {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    font-size: 16px; font-weight: 900; color: var(--primary);
    text-align: center; min-width: 50px; flex-shrink: 0;
  }

  .detalle-footer {
    position: sticky; bottom: 0;
    background: rgba(15,23,42,0.97); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border); padding: 14px 16px;
  }
  .progreso-texto {
    font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 10px;
  }
  .btn-completar {
    width: 100%; padding: 18px; border-radius: var(--radius);
    border: none; font-size: 17px; font-weight: 900;
    background: var(--success); color: white; cursor: pointer;
    transition: 0.2s; letter-spacing: 0.5px;
  }
  .btn-completar:disabled {
    background: rgba(16,185,129,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed;
  }
  .btn-completar:not(:disabled):active { transform: scale(0.98); }

  /* EMPTY STATE */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .empty .icon { font-size: 48px; }

  /* LOADER */
  #loader {
    position: fixed; inset: 0; background: rgba(15,23,42,0.9);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; z-index: 9999;
    color: var(--primary); font-weight: 700;
  }
  .spinner {
    width: 44px; height: 44px; border: 4px solid rgba(245,158,11,0.2);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white; padding: 12px 24px;
    border-radius: 99px; font-size: 14px; font-weight: 600;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    z-index: 5000; white-space: nowrap; animation: slideUp2 0.3s forwards;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes slideUp2 { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div>Cargando...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none;">
  <div style="font-size:48px;">📦</div>
  <h1>Depósito ML</h1>
  <p>Identificate para continuar</p>
  <button class="btn-login" onclick="login('A')">Soy A</button>
  <button class="btn-login" style="background:#64748b;" onclick="login('C')">Soy C</button>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <div id="vistaLista" style="display:flex; flex-direction:column; min-height:100vh;">

    <!-- Header -->
    <div class="header">
      <div class="conn-dot" id="connDot"></div>
      <div class="header-title">📦 Depósito</div>
      <div id="userBadge" class="header-user">A</div>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <button class="filter-btn active" data-estado="pendiente" onclick="setFiltro('pendiente', this)">Pendientes</button>
      <button class="filter-btn" data-estado="armado" onclick="setFiltro('armado', this)">Armados</button>
      <button class="filter-btn" data-estado="todos" onclick="setFiltro('todos', this)">Todos hoy</button>
    </div>

    <!-- Lista -->
    <div id="listaPedidos">
      <div class="empty"><div class="icon">📭</div><div>Cargando pedidos...</div></div>
    </div>
  </div>

  <!-- Detalle pedido -->
  <div id="detalle">
    <div class="detalle-header">
      <button class="btn-back" onclick="volverALista()">← Volver</button>
      <div class="detalle-title" id="detalleTitle">Pedido</div>
      <div id="detalleBadge" class="estado-badge badge-pendiente">—</div>
    </div>
    <div class="detalle-info" id="detalleInfo"></div>
    <div id="listaItems"></div>
    <div class="detalle-footer">
      <div class="progreso-texto" id="progresoTexto">0 / 0 items armados</div>
      <button class="btn-completar" id="btnCompletar" disabled onclick="completarPedido()">
        ✅ MARCAR COMO ARMADO
      </button>
    </div>
  </div>
</div>

<script>
  // ========================================
  // CONFIG
  // ========================================
  const SUPABASE_URL = "https://gjeyvbidomxzofcdycya.supabase.co";
  const SUPABASE_ANON = "sb_publishable_CjdA8GwtCljm_PzT8pqk3g_QIhTmUHT";
  const WORKER_URL    = "https://frosty-term-20ea.santamariapablodaniel.workers.dev";

  let currentUser = null;
  let pedidoActivo = null;
  let itemsActivos = [];
  let filtroActual = "pendiente";
  let realtimeSub  = null;
  let pedidosCache = [];

  // ========================================
  // SUPABASE CLIENT (REST + REALTIME)
  // ========================================
  async function sbGet(table, params = "") {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    return r.ok ? r.json() : [];
  }

  async function sbPatch(table, match, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
        "Content-Type": "application/json", Prefer: "return=representation"
      },
      body: JSON.stringify(data)
    });
    return r.ok ? r.json() : null;
  }

  async function sbInsert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
        "Content-Type": "application/json", Prefer: "return=representation"
      },
      body: JSON.stringify(data)
    });
    return r.ok ? r.json() : null;
  }

  // ========================================
  // REALTIME (Supabase Websocket)
  // ========================================
  function conectarRealtime() {
    const wsUrl = `${SUPABASE_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`;
    const ws = new WebSocket(wsUrl);
    let heartbeat;

    ws.onopen = () => {
      setConn("online");
      // Suscribir a cambios en pedidos
      ws.send(JSON.stringify({
        topic: "realtime:public:pedidos",
        event: "phx_join",
        payload: { config: { broadcast: { self: true }, presence: { key: "" }, postgres_changes: [{ event: "*", schema: "public", table: "pedidos" }] } },
        ref: "1"
      }));
      heartbeat = setInterval(() => ws.readyState === 1 && ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" })), 20000);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === "postgres_changes" || (msg.payload && msg.payload.data)) {
          cargarPedidos(); // Recargar lista cuando hay cambios
        }
      } catch(_) {}
    };

    ws.onclose = () => {
      setConn("offline"); clearInterval(heartbeat);
      setTimeout(conectarRealtime, 3000); // Reconectar
    };

    ws.onerror = () => setConn("offline");
  }

  function setConn(estado) {
    const dot = document.getElementById("connDot");
    if (dot) dot.className = "conn-dot " + estado;
  }

  // ========================================
  // LOGIN
  // ========================================
  function login(user) {
    currentUser = user;
    localStorage.setItem("depositoUser", user);
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("userBadge").textContent = user;
    iniciarApp();
  }

  // ========================================
  // CARGA DE PEDIDOS
  // ========================================
  async function cargarPedidos() {
    setConn("syncing");
    try {
      const hoy = new Date().toISOString().split("T")[0];
      let params = `order=created_at.asc&limit=100`;

      if (filtroActual === "pendiente") params += `&estado=eq.pendiente`;
      else if (filtroActual === "armado") params += `&estado=eq.armado`;
      else params += `&created_at=gte.${hoy}T00:00:00`;

      pedidosCache = await sbGet("pedidos", params);
      renderLista();
      setConn("online");
    } catch(e) {
      setConn("offline");
    }
  }

  function renderLista() {
    const box = document.getElementById("listaPedidos");
    if (!pedidosCache.length) {
      box.innerHTML = `<div class="empty"><div class="icon">📭</div><div>No hay pedidos ${filtroActual === "pendiente" ? "pendientes" : ""}.</div></div>`;
      return;
    }

    box.innerHTML = pedidosCache.map(p => {
      const pct = p.items_total ? Math.round((p.items_armados || 0) / p.items_total * 100) : 0;
      const estadoClass = `estado-${p.estado}`;
      const badgeClass = `badge-${p.estado}`;
      const esActivo = pedidoActivo && pedidoActivo.id === p.id ? "activo" : "";
      const hora = new Date(p.created_at).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
      const fe = p.fecha_entrega ? new Date(p.fecha_entrega + "T12:00:00").toLocaleDateString("es-AR", { day:"2-digit", month:"short"}) : "—";

      return `
        <div class="pedido-card ${estadoClass} ${esActivo}" onclick="abrirPedido('${p.id}')">
          <div class="card-top">
            <div>
              <div class="card-nombre">${p.cliente_nombre || ("Cliente " + (p.cliente_id || "—"))}</div>
              <div class="card-num">N° ${p.cliente_id || "—"} · ${p.vendedor || "—"}</div>
            </div>
            <div class="estado-badge ${badgeClass}">${estadoLabel(p.estado)}</div>
          </div>
          <div class="card-meta">
            <span>⏰ ${hora}</span>
            <span>📅 ${fe}</span>
            ${p.items_total ? `<span>📦 ${p.items_armados||0}/${p.items_total}</span>` : ""}
          </div>
          ${p.items_total ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : ""}
        </div>`;
    }).join("");
  }

  function estadoLabel(e) {
    return { pendiente:"Pendiente", armado:"✅ Armado", en_facturacion:"Facturando", facturado:"Facturado" }[e] || e;
  }

  // ========================================
  // DETALLE DE PEDIDO
  // ========================================
  async function abrirPedido(id) {
    showLoader();
    try {
      const [pedidos, items] = await Promise.all([
        sbGet("pedidos", `id=eq.${id}`),
        sbGet("items_pedido", `pedido_id=eq.${id}&order=id.asc`)
      ]);

      pedidoActivo = pedidos[0];
      itemsActivos = items;

      // Actualizar info header
      document.getElementById("detalleTitle").textContent =
        pedidoActivo.cliente_nombre || ("Cliente " + pedidoActivo.cliente_id);
      const badge = document.getElementById("detalleBadge");
      badge.textContent = estadoLabel(pedidoActivo.estado);
      badge.className = `estado-badge badge-${pedidoActivo.estado}`;

      // Info
      const fe = pedidoActivo.fecha_entrega
        ? new Date(pedidoActivo.fecha_entrega + "T12:00:00").toLocaleDateString("es-AR")
        : "—";
      document.getElementById("detalleInfo").innerHTML = `
        <div class="info-item"><span>Cliente</span><strong>${pedidoActivo.cliente_nombre || "—"}</strong></div>
        <div class="info-item"><span>Vendedor</span><strong>${pedidoActivo.vendedor || "—"}</strong></div>
        <div class="info-item"><span>Entrega</span><strong>${fe}</strong></div>
        <div class="info-item"><span>Obs.</span><strong>${pedidoActivo.observaciones || "—"}</strong></div>
      `;

      renderItems();

      // Mostrar panel detalle
      document.getElementById("vistaLista").style.display = "none";
      document.getElementById("detalle").style.display = "flex";
      document.getElementById("detalle").style.flexDirection = "column";
      document.getElementById("detalle").style.minHeight = "100vh";

    } catch(e) {
      toast("Error al cargar pedido", true);
    } finally {
      hideLoader();
    }
  }

  function renderItems() {
    const box = document.getElementById("listaItems");
    box.innerHTML = itemsActivos.map((item, i) => `
      <div class="item-row ${item.armado ? "armado" : ""}" id="item-row-${item.id}">
        <button class="item-check-btn ${item.armado ? "checked" : ""}"
          onclick="toggleItem('${item.id}', ${i}, ${!item.armado})">
          ${item.armado ? "✓" : ""}
        </button>
        <div class="item-desc ${item.armado ? "tachado" : ""}" id="item-desc-${item.id}">
          ${item.descripcion}
        </div>
        <div class="item-qty">${item.cantidad}</div>
      </div>
    `).join("");
    actualizarProgreso();
  }

  async function toggleItem(itemId, idx, nuevoEstado) {
    // UI optimista
    itemsActivos[idx].armado = nuevoEstado;
    const row = document.getElementById(`item-row-${itemId}`);
    const btn = row.querySelector(".item-check-btn");
    const desc = document.getElementById(`item-desc-${itemId}`);

    if (nuevoEstado) {
      row.classList.add("armado");
      btn.classList.add("checked"); btn.textContent = "✓";
      desc.classList.add("tachado");
    } else {
      row.classList.remove("armado");
      btn.classList.remove("checked"); btn.textContent = "";
      desc.classList.remove("tachado");
    }
    actualizarProgreso();

    // Persistir
    try {
      const now = new Date().toISOString();
      await sbPatch("items_pedido", `id=eq.${itemId}`, {
        armado: nuevoEstado,
        armado_por: currentUser,
        armado_at: nuevoEstado ? now : null,
      });
      await auditoria(pedidoActivo.id, nuevoEstado ? "item_armado" : "item_desarmado",
        { item_id: itemId, descripcion: itemsActivos[idx].descripcion });
    } catch(e) {
      toast("Error al guardar", true);
    }
  }

  function actualizarProgreso() {
    const total = itemsActivos.length;
    const armados = itemsActivos.filter(i => i.armado).length;
    document.getElementById("progresoTexto").textContent = `${armados} / ${total} items armados`;
    const btn = document.getElementById("btnCompletar");
    btn.disabled = armados < total || pedidoActivo?.estado === "armado";
    if (pedidoActivo?.estado === "armado") {
      btn.textContent = "✅ YA ESTÁ ARMADO";
    }
  }

  async function completarPedido() {
    if (!pedidoActivo) return;
    showLoader();
    try {
      await sbPatch("pedidos", `id=eq.${pedidoActivo.id}`, { estado: "armado" });
      await auditoria(pedidoActivo.id, "pedido_armado", { armado_por: currentUser });
      pedidoActivo.estado = "armado";
      document.getElementById("detalleBadge").textContent = "✅ Armado";
      document.getElementById("detalleBadge").className = "estado-badge badge-armado";
      document.getElementById("btnCompletar").disabled = true;
      document.getElementById("btnCompletar").textContent = "✅ YA ESTÁ ARMADO";
      toast("¡Pedido marcado como armado!");
      setTimeout(volverALista, 1000);
    } catch(e) {
      toast("Error al completar", true);
    } finally {
      hideLoader();
    }
  }

  // ========================================
  // AUDITORÍA
  // ========================================
  async function auditoria(pedidoId, accion, detalle = {}) {
    try {
      await sbInsert("auditoria", {
        pedido_id: pedidoId, accion,
        usuario: currentUser, detalle,
      });
    } catch(_) {}
  }

  // ========================================
  // NAV
  // ========================================
  function volverALista() {
    pedidoActivo = null;
    document.getElementById("detalle").style.display = "none";
    document.getElementById("vistaLista").style.display = "flex";
    document.getElementById("vistaLista").style.flexDirection = "column";
    document.getElementById("vistaLista").style.minHeight = "100vh";
    cargarPedidos();
  }

  function setFiltro(estado, btn) {
    filtroActual = estado;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    cargarPedidos();
  }

  // ========================================
  // HELPERS
  // ========================================
  function toast(msg, error = false) {
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = (error ? "⚠️ " : "✅ ") + msg;
    if (error) el.style.borderColor = "var(--danger)";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
  function showLoader() { document.getElementById("loader").style.display = "flex"; }
  function hideLoader() { document.getElementById("loader").style.display = "none"; }

  // ========================================
  // INIT
  // ========================================
  function iniciarApp() {
    cargarPedidos();
    conectarRealtime();
    setInterval(cargarPedidos, 30000); // Polling de respaldo cada 30s
  }

  window.onload = () => {
    hideLoader();
    const savedUser = localStorage.getItem("depositoUser");
    if (savedUser) {
      login(savedUser);
    } else {
      document.getElementById("loginScreen").style.display = "flex";
    }
  };
</script>
</body>
</html>
