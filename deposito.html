<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Depósito ML</title>
  <meta name="theme-color" content="#ffffff"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --hoy:#dc2626; --hoy-bg:#fef2f2; --hoy-brd:#fca5a5;
    --pend:#2563eb; --pend-bg:#eff6ff; --pend-brd:#93c5fd;
    --ok:#16a34a;  --ok-bg:#f0fdf4;  --ok-brd:#86efac;
    --mod:#d97706; --mod-bg:#fffbeb;
    --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
    --radius:14px; --shadow:0 2px 12px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;min-height:100vh;overscroll-behavior:none}

  /* ── HEADER ── */
  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(226,232,240,0.7);
    padding:12px 18px;display:flex;align-items:center;gap:12px;
    box-shadow:0 2px 16px rgba(0,0,0,.06);
  }
  .header-title{font-size:20px;font-weight:900;flex:1}
  .conn-dot{width:12px;height:12px;border-radius:50%;background:#dc2626;flex-shrink:0}
  .conn-dot.online {background:var(--ok);box-shadow:0 0 0 3px #bbf7d0}
  .conn-dot.syncing{background:var(--mod);animation:pulse 1s infinite}

  /* ── TABS ── */
  .tabs{display:flex;padding:10px 16px;gap:10px;background:var(--bg);border-bottom:1px solid var(--border)}
  .tab-btn{
    flex:1;padding:11px 8px;font-size:14px;font-weight:800;
    border:2px solid var(--border);border-radius:99px;cursor:pointer;
    background:var(--card);color:var(--muted);
    box-shadow:0 1px 4px rgba(0,0,0,.06);
    transition:.15s;text-align:center;line-height:1.3
  }
  .tab-btn.hoy.active {color:#fff;border-color:var(--hoy);background:var(--hoy);box-shadow:0 3px 12px rgba(220,38,38,.3)}
  .tab-btn.pend.active{color:#fff;border-color:var(--pend);background:var(--pend);box-shadow:0 3px 12px rgba(37,99,235,.3)}

  /* ── LISTA ── */
  #listaPedidos{padding:14px 16px;display:flex;flex-direction:column;gap:12px;flex:1}

  .pedido-card{
    background:var(--card);border-radius:var(--radius);
    border:2px solid var(--border);box-shadow:var(--shadow);
    padding:18px 20px;cursor:pointer;transition:.15s;border-left:6px solid var(--border)
  }
  .pedido-card:active{transform:scale(.99)}
  .pedido-card.urgente   {border-left-color:var(--hoy);background:var(--hoy-bg)}
  .pedido-card.pendiente {border-left-color:var(--pend);background:var(--pend-bg)}
  .pedido-card.armado-ok {border-left-color:var(--ok);background:var(--ok-bg);opacity:.75}

  .card-num{
    display:inline-block;background:var(--pend-bg);color:var(--pend);
    border:1.5px solid var(--pend-brd);border-radius:99px;
    padding:2px 10px;font-size:12px;font-weight:800;margin-bottom:6px
  }
  .card-nombre{font-size:24px;font-weight:900;color:var(--text);line-height:1.15}
  .card-entrega{
    display:inline-flex;align-items:center;gap:6px;margin-top:8px;
    font-size:13px;font-weight:800;padding:4px 10px;border-radius:99px
  }
  .card-entrega.urg {color:var(--hoy);background:var(--hoy-bg);border:1.5px solid var(--hoy-brd)}
  .card-entrega.pend{color:var(--pend);background:var(--pend-bg);border:1.5px solid var(--pend-brd)}
  .card-meta{font-size:13px;color:var(--muted);margin-top:6px}
  .badge-armado{
    display:inline-block;margin-top:8px;
    background:var(--ok);color:#fff;
    padding:4px 12px;border-radius:99px;font-size:13px;font-weight:800
  }

  /* ── DETALLE ── */
  #vistaDetalle{display:none;flex-direction:column;min-height:100vh;background:var(--bg)}

  .det-header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(226,232,240,0.7);padding:12px 18px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.05)
  }
  .btn-back{
    background:var(--bg);border:2px solid var(--border);color:var(--text);
    padding:10px 18px;border-radius:99px;font-size:15px;font-weight:700;cursor:pointer
  }
  .det-title{font-size:18px;font-weight:900;flex:1}

  .det-info{background:#fff;border-bottom:2px solid var(--border);padding:16px 20px}
  .det-num   {font-size:34px;font-weight:900;color:var(--pend);line-height:1;letter-spacing:-1px}
  .det-nombre{font-size:26px;font-weight:900;color:var(--text);line-height:1.15;margin-top:4px}
  .det-entrega{font-size:18px;font-weight:800;margin-top:8px}
  .det-entrega.urg {color:var(--hoy)}
  .det-entrega.norm{color:var(--pend)}
  .det-sub{font-size:14px;color:var(--muted);margin-top:4px}
  .armador-chip{
    display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    background:#f1f5f9;border:2px solid var(--border);
    padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;color:var(--muted)
  }

  /* ── ITEMS ── */
  #listaItems{padding:12px 16px;display:flex;flex-direction:column;gap:8px;flex:1}

  .item-row{
    background:#fff;border:2px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;transition:.15s
  }
  .item-row.armado  {border-color:var(--ok-brd);background:var(--ok-bg)}
  .item-row.modificado-row{border-color:#fcd34d}

  /* Vista normal */
  .item-main{
    display:grid;grid-template-columns:58px 1fr auto;
    align-items:center;gap:12px;padding:14px 16px
  }
  .check-btn{
    width:52px;height:52px;border-radius:12px;border:3px solid var(--border);
    background:#fff;font-size:24px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0
  }
  .check-btn.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .check-btn:active{transform:scale(.87)}

  .item-info{min-width:0}
  .item-desc{font-size:18px;font-weight:700;color:var(--text);line-height:1.3}
  .item-desc.tachado{text-decoration:line-through;color:var(--muted)}
  .mod-badge{
    display:inline-block;margin-top:4px;
    background:var(--mod-bg);border:1px solid #fcd34d;
    color:var(--mod);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800
  }
  .item-qty-badge{
    background:var(--bg);border:2px solid var(--border);
    border-radius:10px;padding:8px 14px;font-size:22px;font-weight:900;
    color:var(--text);text-align:center;min-width:58px;flex-shrink:0
  }

  /* Barra editar */
  .item-edit-bar{
    display:none;border-top:2px dashed #fcd34d;
    background:var(--mod-bg);padding:12px 16px;gap:8px;flex-wrap:wrap;
    align-items:center
  }
  .edit-input{
    flex:1;min-width:140px;padding:10px 14px;border:2px solid var(--border);
    border-radius:10px;font-size:16px;font-weight:700;background:#fff;color:var(--text);outline:none
  }
  .edit-input:focus{border-color:var(--mod)}
  .edit-qty{
    width:80px;padding:10px 8px;border:2px solid var(--border);
    border-radius:10px;font-size:18px;font-weight:900;text-align:center;
    background:#fff;color:var(--text);outline:none
  }
  .edit-qty:focus{border-color:var(--mod)}
  .btn-edit-save{
    padding:10px 20px;background:var(--mod);color:#fff;border:none;
    border-radius:10px;font-size:15px;font-weight:800;cursor:pointer
  }
  .btn-edit-cancel{
    padding:10px 16px;background:var(--bg);border:2px solid var(--border);
    color:var(--muted);border-radius:10px;font-size:15px;font-weight:700;cursor:pointer
  }
  .btn-edit-toggle{
    background:transparent;border:none;color:var(--muted);font-size:20px;
    cursor:pointer;padding:4px 8px;border-radius:8px;transition:.15s
  }
  .btn-edit-toggle:hover{background:var(--bg);color:var(--mod)}

  /* ── FOOTER ── */
  .det-footer{
    position:sticky;bottom:0;
    background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-top:1px solid rgba(226,232,240,0.7);
    padding:14px 18px;box-shadow:0 -2px 16px rgba(0,0,0,.08)
  }
  #msgMotDep{font-size:13px;color:var(--muted);text-align:center;padding:2px 0 4px;font-style:italic;min-height:18px}
  .progreso{font-size:15px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:12px}
  .btn-armar{
    width:100%;padding:20px;border-radius:99px;border:none;
    font-size:18px;font-weight:900;background:var(--ok);color:#fff;cursor:pointer;
    transition:.15s;box-shadow:0 4px 16px rgba(22,163,74,.35)
  }
  .btn-armar:disabled{background:#d1fae5;color:#86efac;cursor:not-allowed;box-shadow:none}
  .btn-armar:not(:disabled):active{transform:scale(.98)}

  /* ── MODAL ARMADOR ── */
  .modal-over{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:none;align-items:flex-end;justify-content:center;
    z-index:8000;backdrop-filter:blur(3px)
  }
  .modal-box{
    background:#fff;border-radius:24px 24px 0 0;
    padding:28px 24px 36px;width:100%;max-width:480px;
    animation:slideUp .2s ease
  }
  .modal-title{font-size:22px;font-weight:900;margin-bottom:6px}
  .modal-sub  {font-size:15px;color:var(--muted);margin-bottom:20px}
  .modal-input{
    width:100%;padding:16px;border:2px solid var(--border);border-radius:12px;
    font-size:20px;font-weight:700;outline:none;color:var(--text);margin-bottom:14px
  }
  .modal-input:focus{border-color:var(--ok)}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-btn{
    padding:16px;border-radius:12px;font-size:17px;font-weight:800;
    border:none;cursor:pointer;transition:.15s
  }
  .modal-btn.ok    {background:var(--ok);color:#fff}
  .modal-btn.cancel{background:var(--bg);border:2px solid var(--border);color:var(--muted)}
  .modal-btn:active{transform:scale(.97)}

  /* ── MODAL DESTILDAR ── */
  #modalDestildar .modal-box{border-top:4px solid var(--hoy)}
  .modal-btn.danger{background:var(--hoy);color:#fff}

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;padding:14px 28px;
    border-radius:99px;font-size:16px;font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:7000;
    white-space:nowrap;animation:fadeUp .3s ease
  }
  .toast.ok   {background:var(--ok)}
  .toast.error{background:var(--hoy)}
  .toast.mod  {background:var(--mod)}

  /* ── LOADER ── */
  #loader{
    position:fixed;inset:0;background:rgba(255,255,255,.85);
    display:none;align-items:center;justify-content:center;
    z-index:9999;flex-direction:column;gap:16px
  }
  .spinner{width:48px;height:48px;border:5px solid #e2e8f0;border-top-color:var(--ok);border-radius:50%;animation:spin .7s linear infinite}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .icon{font-size:52px;margin-bottom:12px}
  .empty p{font-size:18px;font-weight:600}

  /* ── RESPONSIVE ── */
  @media(min-width:700px){
    #app{max-width:600px;margin:0 auto}
    .item-main{grid-template-columns:58px 1fr auto auto}
  }

  @keyframes spin     {to{transform:rotate(360deg)}}
  @keyframes pulse    {0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes slideUp  {from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeUp   {from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes fadeInUp {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ── TRANSICIONES ── */
  .pedido-card{transition:transform .12s,box-shadow .12s,border-color .12s}
  .pedido-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-1px)}
  .item-row{transition:background .15s,border-color .15s}
  .tab-btn{transition:color .15s,border-color .15s,background .15s}
  .btn-armar{transition:background .15s,transform .1s,box-shadow .15s,opacity .15s}
  .check-btn{transition:background .12s,border-color .12s,transform .1s}

  /* ── DARK MODE ── */
  @media(prefers-color-scheme:dark){
    :root{
      --hoy:#f87171; --hoy-bg:#2d1414; --hoy-brd:#7f1d1d;
      --pend:#60a5fa; --pend-bg:#1b2d4a; --pend-brd:#1e3a6e;
      --ok:#4ade80;  --ok-bg:#14271a;  --ok-brd:#14532d;
      --mod:#fbbf24; --mod-bg:#292008;
      --bg:#12151c; --card:#1e2330; --text:#eef2f7; --muted:#8090a8; --border:#2d3a4e;
      --shadow:0 2px 14px rgba(0,0,0,.4);
    }
    .header,.det-header{background:rgba(30,35,48,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-color:rgba(45,58,78,.8)}
    .det-footer{background:rgba(18,21,28,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-color:rgba(45,58,78,.7)}
    .det-info,.tabs{background:var(--card);border-color:var(--border)}
    .modal-box{background:#1e2330;color:var(--text)}
    .modal-input{background:#12151c;color:var(--text);border-color:var(--border)}
    .check-btn:not(.on){background:var(--card);border-color:var(--border)}
    .item-edit-bar{background:#2a1e04}
    .edit-input,.edit-qty{background:#12151c;color:var(--text);border-color:var(--border)}
    .armador-chip{background:#1e2330;border-color:var(--border)}
    .btn-back{background:#1e2330;border-color:var(--border);color:var(--text)}
    .item-qty-badge{background:var(--bg);border-color:var(--border);color:var(--text)}
    .btn-edit-cancel{background:#1e2330;border-color:var(--border);color:var(--muted)}
    .btn-edit-toggle{color:var(--muted)}
    #detFaltantesPrevios{background:#2a1e04;border-color:#a16207}
    html,body{background:var(--bg);color:var(--text)}
  }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div style="font-size:16px;font-weight:700;color:#64748b">Cargando...</div></div>

<div id="app" style="display:flex;flex-direction:column;min-height:100vh">

  <!-- ── Vista lista ── -->
  <div id="vistaLista" style="display:flex;flex-direction:column;min-height:100vh">
    <div class="header">
      <div class="conn-dot" id="connDot"></div>
      <div class="header-title">📦 Depósito</div>
    </div>
    <div class="tabs">
      <button class="tab-btn hoy active" id="tabHoy"  onclick="setTab('hoy')">🔴 HOY<br><span style="font-size:12px;font-weight:600">Esta semana</span></button>
      <button class="tab-btn pend"       id="tabPend" onclick="setTab('pend')">🔵 PRÓXIMA SEMANA<br><span style="font-size:12px;font-weight:600">Pedidos a preparar</span></button>
    </div>
    <div id="listaPedidos"></div>
  </div>

  <!-- ── Vista detalle ── -->
  <div id="vistaDetalle">
    <div class="det-header">
      <button class="btn-back" onclick="volverALista()">← Volver</button>
      <div class="det-title" id="detTitle">Pedido</div>
    </div>
    <div class="det-info">
      <div class="det-num"    id="detNum">N° —</div>
      <div class="det-nombre" id="detNombre">—</div>
      <div class="det-entrega" id="detEntrega">—</div>
      <div class="det-sub"    id="detSub">—</div>
      <div class="armador-chip" id="armadorChip" style="display:none">
        🧑‍🏭 Armando: <strong id="armadorNombre"></strong>
      </div>
    </div>
    <!-- Faltantes de la semana pasada -->
    <div id="detFaltantesPrevios" style="display:none;margin:12px 16px 0;background:#fffbeb;border-left:6px solid #f59e0b;border-radius:10px;padding:12px 16px;">
      <div style="font-size:13px;font-weight:900;color:#92400e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">⚠️ Faltantes semana pasada</div>
      <div id="detFaltantesList"></div>
    </div>

    <div id="listaItems"></div>
    <div class="det-footer">
      <div id="msgMotDep"></div>
      <div class="progreso" id="progresoTxt">0 / 0 items</div>
      <button class="btn-armar" id="btnArmar" disabled onclick="completarPedido()">✅ MARCAR COMO ARMADO</button>
    </div>
  </div>
</div>

<!-- ── Modal: ¿Quién arma? ── -->
<div class="modal-over" id="modalArmador">
  <div class="modal-box">
    <div class="modal-title">📦 ¿Quién va a armar?</div>
    <div class="modal-sub">Tu nombre se guarda en cada item que marques.</div>
    <input class="modal-input" id="inputArmador" type="text" placeholder="Tu nombre..." maxlength="40"
      onkeydown="if(event.key==='Enter')confirmarArmador()"/>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="cerrarModalArmador()">Cancelar</button>
      <button class="modal-btn ok"     onclick="confirmarArmador()">Empezar ✓</button>
    </div>
  </div>
</div>

<!-- ── Modal: Confirmar destildar ── -->
<div class="modal-over" id="modalDestildar">
  <div class="modal-box">
    <div class="modal-title">⚠️ ¿Destildar este artículo?</div>
    <div class="modal-sub">Va a quedar como <strong style="color:var(--hoy)">faltante</strong> en facturación.</div>
    <div style="font-size:18px;font-weight:800;color:var(--hoy);margin-bottom:20px" id="destildarNombre"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="cerrarModalDestildar()">Cancelar</button>
      <button class="modal-btn danger" onclick="confirmarDestildar()">Sí, destildar</button>
    </div>
  </div>
</div>

  window.SUPABASE_URL      = 'https://gjeyvbidomxzofcdycya.supabase.co';

</script>
<script>
// ── CONFIG ──
const SB_URL  = window.SUPABASE_URL;
const SB_ANON = window.SUPABASE_ANON_KEY;

let tabActual      = "hoy";
let pedidosCache   = [];
let pedidoActivo   = null;
let itemsActivos   = [];
let armadorActual  = localStorage.getItem("depositoArmador") || "";
let pendingPedidoId= null;   // pedido esperando confirmación de armador
let confirmDestildar = null; // {itemId, idx}

// ── FECHAS ──
function viernesISO() {
  const h = new Date(), diff = 5 - h.getDay();
  const v = new Date(h); v.setDate(h.getDate() + (diff >= 0 ? diff : diff + 7));
  return v.toISOString().split("T")[0];
}
function esUrgente(fe) { return !fe || fe <= viernesISO(); }
function fmtFechaLarga(fe) {
  if (!fe) return "—";
  return new Date(fe + "T12:00:00").toLocaleDateString("es-AR",
    {weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"}).toUpperCase();
}

// ── SUPABASE ──
async function sbGet(t, p="") {
  const r = await fetch(`${SB_URL}/rest/v1/${t}?${p}`,
    {headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`}});
  return r.ok ? r.json() : [];
}
async function sbPatch(t, match, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}?${match}`, {
    method:"PATCH",
    headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`,
      "Content-Type":"application/json",Prefer:"return=representation"},
    body:JSON.stringify(data)
  });
  return r.ok ? r.json() : null;
}
async function sbInsert(t, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${t}`, {
    method:"POST",
    headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`,
      "Content-Type":"application/json",Prefer:"return=minimal"},
    body:JSON.stringify(data)
  });
  return r.ok;
}

// ── REALTIME ──
function conectarRealtime() {
  const ws = new WebSocket(
    `${SB_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SB_ANON}&vsn=1.0.0`);
  let hb;
  ws.onopen = () => {
    setConn("online");
    ws.send(JSON.stringify({topic:"realtime:public:pedidos",event:"phx_join",
      payload:{config:{postgres_changes:[{event:"*",schema:"public",table:"pedidos"}]}},ref:"1"}));
    hb = setInterval(() =>
      ws.readyState===1 && ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"})),20000);
    flushSyncQueue();
  };
  let _rtDebounce = null;
  ws.onmessage = e => {
    try {
      if(JSON.parse(e.data).payload?.data?.table==="pedidos") {
        clearTimeout(_rtDebounce);
        _rtDebounce = setTimeout(cargarPedidos, 500);
      }
    } catch(_){}
  };
  ws.onclose = () => { setConn("offline"); clearInterval(hb); setTimeout(conectarRealtime,3000); };
  ws.onerror = () => setConn("offline");
}
function setConn(s) { const d=document.getElementById("connDot"); if(d) d.className="conn-dot "+s; }

// ── TABS ──
function setTab(t) {
  tabActual = t;
  document.getElementById("tabHoy").classList.toggle("active",  t==="hoy");
  document.getElementById("tabPend").classList.toggle("active", t==="pend");
  renderLista();
}

// ── CARGA ──
let _pedidosHash = "";
async function cargarPedidos() {
  setConn("syncing");
  try {
    const data = await sbGet("pedidos",
      "estado=in.(pendiente,armado)&order=fecha_entrega.asc,created_at.asc&limit=200");
    setConn("online");
    const hash = JSON.stringify(data.map(p => p.id+"|"+p.estado+"|"+(p.armado_por||"")));
    if (hash !== _pedidosHash) {
      _pedidosHash = hash;
      pedidosCache = data;
      renderLista();
    }
  } catch(e) { setConn("offline"); }
}

function renderLista() {
  const filtrados = pedidosCache.filter(p =>
    tabActual === "hoy"
      ? p.estado !== "armado" &&  esUrgente(p.fecha_entrega)
      : p.estado !== "armado" && !esUrgente(p.fecha_entrega)
  );

  const cHoy  = pedidosCache.filter(p => p.estado !== "armado" &&  esUrgente(p.fecha_entrega)).length;
  const cPend = pedidosCache.filter(p => p.estado !== "armado" && !esUrgente(p.fecha_entrega)).length;
  document.getElementById("tabHoy").innerHTML  =
    `🔴 HOY<br><span style="font-size:12px;font-weight:600">Esta semana (${cHoy})</span>`;
  document.getElementById("tabPend").innerHTML =
    `🔵 PRÓXIMA SEMANA<br><span style="font-size:12px;font-weight:600">Pedidos a preparar (${cPend})</span>`;

  const box = document.getElementById("listaPedidos");
  if (!filtrados.length) {
    box.innerHTML=`<div class="empty"><div class="icon">${tabActual==="hoy"?"📭":tabActual==="arm"?"🎉":"🗓️"}</div><p>Sin pedidos.</p></div>`;
    return;
  }
  box.innerHTML = filtrados.map((p, idx) => {
    const urg = esUrgente(p.fecha_entrega);
    const cc  = p.estado==="armado" ? "armado-ok" : urg ? "urgente" : "pendiente";
    const ec  = urg ? "urg" : "pend";
    const icon= urg ? "🔴" : "🔵";
    const fe  = fmtFechaLarga(p.fecha_entrega);
    return `
      <div class="pedido-card ${cc}" onclick="pedidoClick('${p.id}')" style="animation:fadeInUp .2s ease ${idx*40}ms both">
        <div class="card-num">N° ${p.cliente_id||"—"}</div>
        <div class="card-nombre">${p.cliente_nombre||"Cliente "+p.cliente_id||"—"}</div>
        <div class="card-entrega ${ec}">${icon} SE ENTREGA: ${fe}</div>
        <div class="card-meta">Vendedor: ${p.vendedor||"—"} · ${p.observaciones||"Sin obs."}</div>
        ${p.estado==="armado" ? `<div class="badge-armado">✅ ARMADO${p.armado_por ? " · " + p.armado_por : ""}</div>` : ""}
      </div>`;
  }).join("");
}

// ── ABRIR PEDIDO ──
function pedidoClick(id) {
  pendingPedidoId = id;
  // Mostrar modal armador pre-llenado con último nombre
  const inp = document.getElementById("inputArmador");
  inp.value = armadorActual;
  document.getElementById("modalArmador").style.display = "flex";
  setTimeout(() => inp.focus(), 100);
}

function cerrarModalArmador() {
  pendingPedidoId = null;
  document.getElementById("modalArmador").style.display = "none";
}

async function confirmarArmador() {
  const nombre = document.getElementById("inputArmador").value.trim();
  if (!nombre) { document.getElementById("inputArmador").focus(); return; }
  armadorActual = nombre;
  localStorage.setItem("depositoArmador", nombre);
  document.getElementById("modalArmador").style.display = "none";
  await abrirPedido(pendingPedidoId);
  pendingPedidoId = null;
}

async function abrirPedido(id) {
  showLoader();
  try {
    const [ps, items] = await Promise.all([
      sbGet("pedidos", `id=eq.${id}`),
      sbGet("items_pedido", `pedido_id=eq.${id}&order=id.asc`)
    ]);
    pedidoActivo = ps[0];
    itemsActivos = items;

    const urg = esUrgente(pedidoActivo.fecha_entrega);
    document.getElementById("detTitle").textContent =
      pedidoActivo.cliente_nombre || "Cliente "+pedidoActivo.cliente_id;
    document.getElementById("detNum").textContent = "N° " + (pedidoActivo.cliente_id||"—");
    document.getElementById("detNombre").textContent =
      pedidoActivo.cliente_nombre || "Cliente "+pedidoActivo.cliente_id;
    document.getElementById("detEntrega").textContent =
      `${urg?"🔴":"🔵"} SE ENTREGA: ${fmtFechaLarga(pedidoActivo.fecha_entrega)}`;
    document.getElementById("detEntrega").className = `det-entrega ${urg?"urg":"norm"}`;
    document.getElementById("detSub").textContent =
      `Vendedor: ${pedidoActivo.vendedor||"—"} · ${pedidoActivo.observaciones||"Sin obs."}`;

    const chip = document.getElementById("armadorChip");
    chip.style.display = "inline-flex";
    document.getElementById("armadorNombre").textContent = armadorActual;

    renderItems();
    cargarFaltantesPreviosDeposito(pedidoActivo.cliente_id, pedidoActivo.id);
    localStorage.setItem("depositoActivePedido", id);  // persistencia
    document.getElementById("vistaLista").style.display = "none";
    const vd = document.getElementById("vistaDetalle");
    vd.style.display = "flex"; vd.style.flexDirection = "column"; vd.style.minHeight = "100vh";
  } catch(e) { toast("Error al cargar pedido","error"); }
  finally { hideLoader(); }
}

// ── RENDER ITEMS ──
function renderItems() {
  const box = document.getElementById("listaItems");
  box.innerHTML = itemsActivos.map((item, i) => {
    const armado = item.armado;
    const mod    = item.modificado;
    return `
      <div class="item-row ${armado?"armado":""} ${mod?"modificado-row":""}" id="irow-${item.id}">
        <div class="item-main">
          <button class="check-btn ${armado?"on":""}" onclick="toggleItem('${item.id}',${i},${!armado})">
            ${armado?"✓":""}
          </button>
          <div class="item-info">
            <div class="item-desc ${armado?"tachado":""}" id="idesc-${item.id}">${item.descripcion}</div>
            ${mod ? `<div class="mod-badge">🔔 MODIFICADO</div>` : ""}
          </div>
          <div class="item-qty-badge" id="iqty-${item.id}">${item.cantidad}</div>
          <button class="btn-edit-toggle" onclick="toggleEdit('${item.id}',${i})" title="Editar artículo">✏️</button>
        </div>
        <div class="item-edit-bar" id="iedit-${item.id}" style="display:flex">
          <input class="edit-input" id="einput-${item.id}" value="${item.descripcion}" placeholder="Nombre del artículo"/>
          <input class="edit-qty"   id="eqty-${item.id}"   type="number" min="0" value="${item.cantidad}" style="width:80px"/>
          <button class="btn-edit-save"   onclick="guardarEdit('${item.id}',${i})">✓ Guardar</button>
          <button class="btn-edit-cancel" onclick="cancelarEdit('${item.id}')">✗</button>
        </div>
      </div>`;
  }).join("");
  // Ocultar barras de edición por defecto
  document.querySelectorAll(".item-edit-bar").forEach(b => b.style.display = "none");
  actualizarProgreso();
}

// ── EDITAR ITEM ──
function toggleEdit(itemId, idx) {
  const bar = document.getElementById(`iedit-${itemId}`);
  const showing = bar.style.display !== "none";
  // Cerrar todos primero
  document.querySelectorAll(".item-edit-bar").forEach(b => b.style.display = "none");
  if (!showing) {
    bar.style.display = "flex";
    document.getElementById(`einput-${itemId}`).focus();
  }
}

function cancelarEdit(itemId) {
  document.getElementById(`iedit-${itemId}`).style.display = "none";
}

async function guardarEdit(itemId, idx) {
  const nuevoDesc = document.getElementById(`einput-${itemId}`).value.trim();
  const nuevaQty  = parseFloat(document.getElementById(`eqty-${itemId}`).value);
  if (!nuevoDesc || isNaN(nuevaQty) || nuevaQty < 0) {
    toast("Datos inválidos","error"); return;
  }

  const item = itemsActivos[idx];
  const cambioDesc = nuevoDesc !== item.descripcion;
  const cambioQty  = nuevaQty  !== item.cantidad;
  if (!cambioDesc && !cambioQty) { cancelarEdit(itemId); return; }

  const patchData = {
    cantidad: nuevaQty,
    descripcion: nuevoDesc,
    modificado: true,
  };
  if (cambioDesc && !item.nombre_original) {
    patchData.nombre_original = item.descripcion;
  }

  try {
    await sbPatch("items_pedido", `id=eq.${itemId}`, patchData);
    // Actualizar local
    if (cambioDesc && !item.nombre_original) item.nombre_original = item.descripcion;
    item.descripcion = nuevoDesc;
    item.cantidad    = nuevaQty;
    item.modificado  = true;

    // Actualizar UI
    document.getElementById(`idesc-${itemId}`).textContent = nuevoDesc;
    document.getElementById(`iqty-${itemId}`).textContent  = nuevaQty;
    const row = document.getElementById(`irow-${itemId}`);
    row.classList.add("modificado-row");
    if (!row.querySelector(".mod-badge")) {
      document.getElementById(`idesc-${itemId}`).insertAdjacentHTML("afterend",
        `<div class="mod-badge">🔔 MODIFICADO</div>`);
    }
    cancelarEdit(itemId);
    toast("Artículo actualizado ✓","mod");
  } catch(e) { toast("Error al guardar","error"); }
}

// ── TOGGLE ARMADO ──
async function toggleItem(itemId, idx, nuevoEstado) {
  if (!nuevoEstado && itemsActivos[idx].armado) {
    confirmDestildar = {itemId, idx};
    document.getElementById("destildarNombre").textContent = itemsActivos[idx].descripcion;
    document.getElementById("modalDestildar").style.display = "flex";
    return;
  }
  await aplicarToggle(itemId, idx, true);
}

function cerrarModalDestildar() {
  confirmDestildar = null;
  document.getElementById("modalDestildar").style.display = "none";
}

async function confirmarDestildar() {
  if (!confirmDestildar) return;
  const {itemId, idx} = confirmDestildar;
  cerrarModalDestildar();
  await aplicarToggle(itemId, idx, false);
}

async function aplicarToggle(itemId, idx, nuevoEstado) {
  itemsActivos[idx].armado = nuevoEstado;
  const row  = document.getElementById(`irow-${itemId}`);
  const btn  = row.querySelector(".check-btn");
  const desc = document.getElementById(`idesc-${itemId}`);
  if (nuevoEstado) {
    row.classList.add("armado"); btn.classList.add("on"); btn.textContent="✓"; desc.classList.add("tachado");
  } else {
    row.classList.remove("armado"); btn.classList.remove("on"); btn.textContent=""; desc.classList.remove("tachado");
  }
  actualizarProgreso();
  const now = new Date().toISOString();
  await sbPatch("items_pedido", `id=eq.${itemId}`, {
    armado: nuevoEstado,
    armado_por:  nuevoEstado ? armadorActual : null,
    armado_at:   nuevoEstado ? now : null,
  }).catch(() => toast("Error al guardar","error"));
}

// ── PROGRESO ──
const MSGS_MOT_DEP = [
  "Buen ritmo, seguí así 💪",
  "Cada artículo cuenta, tomá tu tiempo",
  "Vas bien, ya falta poco",
  "Revisá bien cada item antes de marcar",
  "¡Excelente! Casi terminás",
  "Sin apuros, el orden es lo que importa",
];
function actualizarProgreso() {
  const total    = itemsActivos.length;
  const armados  = itemsActivos.filter(i => i.armado).length;
  const faltantes = total - armados;
  const btn = document.getElementById("btnArmar");
  let txt = `${armados} / ${total} items armados`;
  if (faltantes > 0 && armados > 0) txt += ` · ${faltantes} irán como faltante${faltantes>1?"s":""}`;
  document.getElementById("progresoTxt").textContent = txt;

  // Mensaje motivacional según progreso
  const mot = document.getElementById("msgMotDep");
  if (mot) {
    if (pedidoActivo?.estado === "armado") {
      mot.textContent = "";
    } else if (total === 0) {
      mot.textContent = "Sin artículos cargados — podés enviar igualmente";
      mot.style.color = "var(--pend)";
    } else if (armados === total) {
      mot.textContent = "🎉 ¡Todo listo para entregar!";
      mot.style.color = "var(--ok)";
    } else if (armados === 0) {
      mot.textContent = "Empezá marcando los artículos a medida que los armás";
      mot.style.color = "";
    } else {
      const pct = armados / total;
      const idx = Math.min(Math.floor(pct * MSGS_MOT_DEP.length), MSGS_MOT_DEP.length - 1);
      mot.textContent = MSGS_MOT_DEP[idx];
      mot.style.color = "";
    }
  }

  if (pedidoActivo?.estado === "armado") {
    btn.disabled = true; btn.textContent = "✅ YA ESTÁ ARMADO";
  } else {
    // Permitir enviar aunque no haya items (pedido vacío = todos faltantes)
    btn.disabled = total > 0 && armados === 0;
    btn.textContent = total === 0 ? "✅ ENVIAR SIN ITEMS" :
      (faltantes>0 && armados>0
        ? `✅ ARMAR (${faltantes} faltante${faltantes>1?"s":""})`
        : "✅ MARCAR COMO ARMADO");
  }
}

// ── COMPLETAR ──
async function completarPedido() {
  if (!pedidoActivo || pedidoActivo.estado==="armado") return;
  showLoader();
  try {
    const faltantes = itemsActivos.filter(i => !i.armado);
    if (faltantes.length) {
      // es_faltante es opcional — si la columna no existe, no bloquea
      await Promise.all(faltantes.map(i =>
        sbPatch("items_pedido",`id=eq.${i.id}`,{es_faltante:true}).catch(()=>{})
      ));
    }
    const nowArmado = new Date().toISOString();
    // CRÍTICO: cambiar estado a armado
    await sbPatch("pedidos",`id=eq.${pedidoActivo.id}`,{estado:"armado"});
    // OPCIONAL: guardar quién armó (requiere columnas armado_por/armado_at en pedidos)
    sbPatch("pedidos",`id=eq.${pedidoActivo.id}`,{
      armado_por:armadorActual, armado_at:nowArmado
    }).catch(()=>{});
    await sbInsert("auditoria",{
      pedido_id:pedidoActivo.id, accion:"pedido_armado", usuario:armadorActual,
      detalle:{armados:itemsActivos.filter(i=>i.armado).length, faltantes:faltantes.length}
    });
    pedidoActivo.estado = "armado";
    actualizarProgreso();
    toast(faltantes.length
      ? `✅ Armado con ${faltantes.length} faltante${faltantes.length>1?"s":""}!`
      : "✅ ¡Pedido armado completo!", "ok");
    setTimeout(volverALista, 1400);
  } catch(e) { toast("Error","error"); }
  finally { hideLoader(); }
}

// ── FALTANTES PREVIOS (depósito) ──
async function cargarFaltantesPreviosDeposito(clienteId, pedidoActualId) {
  const sec = document.getElementById("detFaltantesPrevios");
  sec.style.display = "none";
  if (!clienteId) return;
  try {
    const hace15 = new Date();
    hace15.setDate(hace15.getDate() - 15);
    const previos = await sbGet("pedidos",
      `cliente_id=eq.${encodeURIComponent(clienteId)}&estado=eq.facturado&created_at=gte.${hace15.toISOString()}&id=neq.${pedidoActualId}&order=created_at.desc&limit=3`);
    if (!previos.length) return;
    const faltantes = [];
    for (const p of previos) {
      const items = await sbGet("items_pedido", `pedido_id=eq.${p.id}&es_faltante=eq.true`);
      faltantes.push(...items);
    }
    if (!faltantes.length) return;
    const vistos = new Set();
    const unicos = faltantes.filter(f => {
      const k = f.descripcion.toLowerCase().trim();
      if (vistos.has(k)) return false;
      vistos.add(k); return true;
    });
    document.getElementById("detFaltantesList").innerHTML =
      unicos.map(f => `<div style="font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px solid #fde68a;display:flex;gap:10px;">
        <span style="color:#d97706;font-weight:900;min-width:32px;">${f.cantidad}</span>
        <span>${f.descripcion}</span>
      </div>`).join("");
    sec.style.display = "block";
  } catch(_) {}
}

// ── OFFLINE QUEUE ──
let syncQueue = JSON.parse(localStorage.getItem("depositoSyncQueue") || "[]");

async function sbPatchQueued(t, match, data) {
  try {
    return await sbPatch(t, match, data);
  } catch(e) {
    syncQueue.push({ t, match, data, ts: Date.now() });
    localStorage.setItem("depositoSyncQueue", JSON.stringify(syncQueue));
    toast("Sin conexión — se guardará al reconectar", "mod");
    return null;
  }
}

async function flushSyncQueue() {
  if (!syncQueue.length) return;
  const pending = [...syncQueue];
  syncQueue = [];
  localStorage.setItem("depositoSyncQueue", JSON.stringify([]));
  let fallidos = 0;
  for (const op of pending) {
    try { await sbPatch(op.t, op.match, op.data); }
    catch(e) { syncQueue.push(op); fallidos++; }
  }
  if (syncQueue.length) localStorage.setItem("depositoSyncQueue", JSON.stringify(syncQueue));
  if (pending.length - fallidos > 0) toast(`✅ ${pending.length - fallidos} cambios sincronizados`, "ok");
}

// ── NAV ──
function volverALista() {
  pedidoActivo = null;
  localStorage.removeItem("depositoActivePedido");
  document.getElementById("vistaDetalle").style.display = "none";
  const vl = document.getElementById("vistaLista");
  vl.style.display="flex"; vl.style.flexDirection="column"; vl.style.minHeight="100vh";
  cargarPedidos();
}

// ── UTILS ──
function showLoader(){document.getElementById("loader").style.display="flex"}
function hideLoader(){document.getElementById("loader").style.display="none"}
let tt;
function toast(msg,tipo=""){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const el=document.createElement("div"); el.className=`toast ${tipo}`; el.textContent=msg;
  document.body.appendChild(el); clearTimeout(tt); tt=setTimeout(()=>el.remove(),2800);
}

// ── INIT ──
window.onload = async () => {
  hideLoader();
  await cargarPedidos();
  conectarRealtime();
  setInterval(cargarPedidos, 30000);
  // Restaurar pedido activo si se recargó la página
  const activoId = localStorage.getItem("depositoActivePedido");
  if (activoId) {
    const p = pedidosCache.find(p => p.id === activoId);
    if (p) abrirPedido(activoId);
  }
};
