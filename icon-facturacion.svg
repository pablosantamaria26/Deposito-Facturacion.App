  <!-- Text lines -->
  <rect x="62" y="74" width="60" height="7" rx="3.5" fill="#1d4ed8" opacity="0.85"/>
  <rect x="62" y="91" width="48" height="6" rx="3" fill="#94a3b8"/>
  <rect x="62" y="105" width="52" height="6" rx="3" fill="#94a3b8"/>
  <rect x="62" y="119" width="42" height="6" rx="3" fill="#94a3b8"/>

  <!-- $ symbol on bottom right -->
  <circle cx="112" cy="124" r="18" fill="#1d4ed8"/>
  <text x="112" y="131" font-size="20" font-weight="900" font-family="Arial,sans-serif" fill="white" text-anchor="middle">$</text>
