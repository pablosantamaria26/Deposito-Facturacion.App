<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#1d4ed8"/>

  <!-- Document shadow -->
  <rect x="54" y="38" width="88" height="112" rx="8" fill="rgba(0,0,0,0.25)"/>

  <!-- Document body -->
