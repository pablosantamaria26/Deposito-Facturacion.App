<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación ML</title>
  <meta name="theme-color" content="#ffffff" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --hoy:       #dc2626;
    --hoy-bg:    #fef2f2;
    --hoy-brd:   #fca5a5;
    --manana:    #d97706;
    --man-bg:    #fffbeb;
    --man-brd:   #fcd34d;
    --prox:      #2563eb;
    --prox-bg:   #eff6ff;
    --prox-brd:  #93c5fd;
    --success:   #16a34a;
    --succ-bg:   #f0fdf4;
    --danger:    #dc2626;
    --bg:        #f1f5f9;
    --card:      #ffffff;
    --text:      #0f172a;
    --muted:     #64748b;
    --border:    #e2e8f0;
    --radius:    14px;
    --shadow:    0 2px 12px rgba(0,0,0,0.07);
    --left-w:    340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 20px; background: #fff;
  }
  .login-btn {
    width: 220px; padding: 18px; border-radius: var(--radius);
    border: none; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.15s;
  }
  .login-btn.a { background: var(--hoy);  color: #fff; }
  .login-btn.c { background: var(--prox); color: #fff; }
  .login-btn:active { transform: scale(0.97); }

  /* ── LAYOUT ── */
  #app { display: none; height: 100vh; flex-direction: column; }

  .topbar {
    height: 56px; background: #fff;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 14px;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .topbar-title { font-size: 20px; font-weight: 900; flex: 1; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #dc2626; }
  .conn-dot.online  { background: var(--success); box-shadow: 0 0 0 3px #bbf7d0; }
  .conn-dot.syncing { background: var(--manana); animation: pulse 1s infinite; }
  .user-chip {
    background: var(--hoy); color: #fff;
    padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 900;
  }

  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── PANEL IZQUIERDO ── */
  .panel-left {
    width: var(--left-w); flex-shrink: 0;
    background: var(--card); border-right: 2px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .left-search { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .left-search input {
    width: 100%; padding: 10px 14px; border-radius: 99px;
    border: 2px solid var(--border); font-size: 14px; outline: none;
    background: var(--bg); color: var(--text);
  }
  .left-search input:focus { border-color: var(--prox); }

  .grupo { flex-shrink: 0; }
  .grupo-header {
    padding: 10px 14px 8px;
    font-size: 12px; font-weight: 900; text-transform: uppercase;
    letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    z-index: 10; background: inherit;
  }
  .grupo-header.hoy   { background: var(--hoy-bg);  color: var(--hoy); border-left: 4px solid var(--hoy); }
  .grupo-header.man   { background: var(--man-bg);  color: var(--manana); border-left: 4px solid var(--manana); }
  .grupo-header.prox  { background: var(--prox-bg); color: var(--prox); border-left: 4px solid var(--prox); }
  .grupo-count {
    margin-left: auto; background: currentColor; color: #fff;
    border-radius: 99px; font-size: 11px; padding: 1px 8px; opacity: 0.85;
  }

  #pedidosList { flex: 1; overflow-y: auto; }
  #pedidosList::-webkit-scrollbar { width: 4px; }
  #pedidosList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pedido-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: 0.12s;
    border-left: 4px solid transparent;
  }
  .pedido-item:hover { background: var(--bg); }
  .pedido-item.selected { background: #eff6ff; border-left-color: var(--prox); }
  .pedido-item.grp-hoy.selected  { background: var(--hoy-bg); border-left-color: var(--hoy); }
  .pedido-item.grp-man.selected  { background: var(--man-bg); border-left-color: var(--manana); }
  .pedido-item.facturado         { opacity: 0.5; }

  .pi-nombre { font-size: 15px; font-weight: 800; color: var(--text); }
  .pi-fecha  { font-size: 13px; font-weight: 600; margin-top: 3px; }
  .pi-fecha.hoy-c  { color: var(--hoy); }
  .pi-fecha.man-c  { color: var(--manana); }
  .pi-fecha.prox-c { color: var(--prox); }
  .pi-meta   { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pi-prog   { height: 4px; background: rgba(0,0,0,0.07); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .pi-prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* ── PANEL DERECHO ── */
  .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .no-sel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; color: var(--muted);
  }
  .no-sel .icon { font-size: 64px; }
  .no-sel p { font-size: 20px; font-weight: 700; }

  #pedidoPanel { display: none; flex-direction: column; height: 100%; }

  /* Header del pedido */
  .ped-header {
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 20px 24px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .ped-cliente { font-size: 32px; font-weight: 900; color: var(--text); line-height: 1.1; }
  .ped-entrega {
    font-size: 20px; font-weight: 800; margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .ped-entrega.hoy-e   { color: var(--hoy); }
  .ped-entrega.man-e   { color: var(--manana); }
  .ped-entrega.prox-e  { color: var(--prox); }
  .ped-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .ped-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .chip {
    background: var(--bg); border: 2px solid var(--border);
    padding: 5px 12px; border-radius: 99px; font-size: 13px;
    font-weight: 600; color: var(--muted);
  }

  /* Toolbar IA */
  .ia-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; gap: 8px; flex-shrink: 0;
  }
  .btn-ia {
    background: var(--bg); border: 2px solid var(--border);
    color: var(--muted); padding: 8px 16px; border-radius: 99px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.12s;
  }
  .btn-ia:hover { border-color: var(--prox); color: var(--prox); }

  /* Lista items */
  #itemsPanel { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  #itemsPanel::-webkit-scrollbar { width: 4px; }
  #itemsPanel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item-f {
    background: #fff; border: 2px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: grid; grid-template-columns: 54px 1fr 90px 54px;
    align-items: center; gap: 14px; box-shadow: var(--shadow);
    transition: 0.12s;
  }
  .item-f.ok       { border-color: #86efac; background: var(--succ-bg); }
  .item-f.faltante { border-color: var(--hoy-brd); background: var(--hoy-bg); }
  .item-f:hover { border-color: #cbd5e1; }

  .chk-f {
    width: 50px; height: 50px; border-radius: 12px;
    border: 3px solid var(--border); background: #fff;
    font-size: 24px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.12s; flex-shrink: 0;
  }
  .chk-f.ok       { background: var(--success); border-color: var(--success); color: #fff; }
  .chk-f.faltante { background: var(--hoy-bg); border-color: var(--hoy); color: var(--hoy); }
  .chk-f:active   { transform: scale(0.87); }

  .item-f-desc { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .item-f-desc.tachado { text-decoration: line-through; color: var(--muted); }
  .item-f-who  { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .qty-in {
    width: 80px; border: 2px solid var(--border); border-radius: 10px;
    padding: 10px 8px; font-size: 20px; font-weight: 900;
    text-align: center; background: var(--bg); color: var(--text); outline: none;
  }
  .qty-in:focus { border-color: var(--prox); background: #fff; }
  .qty-in.mod   { border-color: var(--manana); color: var(--manana); }

  .btn-falt {
    width: 46px; height: 46px; border-radius: 10px;
    border: 2px solid var(--border); background: #fff;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.12s; flex-shrink: 0;
  }
  .btn-falt:hover { border-color: var(--hoy); background: var(--hoy-bg); }
  .btn-falt.activo { border-color: var(--hoy); background: var(--hoy-bg); }

  /* Footer */
  .ped-footer {
    background: #fff; border-top: 2px solid var(--border);
    padding: 16px 24px; flex-shrink: 0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
  }
  .footer-stats {
    display: flex; gap: 20px; margin-bottom: 12px;
    font-size: 14px; font-weight: 700; color: var(--muted);
  }
  .footer-stats .ok-count  { color: var(--success); }
  .footer-stats .flt-count { color: var(--hoy); }
  .footer-actions { display: flex; gap: 12px; }

  .btn-facturar {
    flex: 1; padding: 18px; border-radius: var(--radius);
    border: none; font-size: 18px; font-weight: 900;
    background: var(--success); color: #fff; cursor: pointer;
    transition: 0.15s; box-shadow: 0 4px 12px rgba(22,163,74,0.3);
  }
  .btn-facturar:disabled {
    background: #d1fae5; color: #6ee7b7; cursor: not-allowed; box-shadow: none;
  }
  .btn-facturar:not(:disabled):active { transform: scale(0.98); }

  .btn-wa {
    padding: 18px 20px; border-radius: var(--radius);
    border: 2px solid var(--border); background: #fff;
    font-size: 18px; cursor: pointer; font-weight: 700; color: var(--muted);
    transition: 0.15s;
  }
  .btn-wa:hover { border-color: #25D366; color: #25D366; }

  /* Panel IA flotante */
  #iaPanel {
    display: none; position: absolute;
    right: 20px; top: 80px; width: 360px;
    background: #fff; border: 2px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 200; flex-direction: column; max-height: calc(100vh - 120px);
  }
  .ia-head {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 800;
  }
  .ia-body { padding: 18px; overflow-y: auto; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }

  /* LOADER / TOAST */
  #loader {
    position: fixed; inset: 0; background: rgba(255,255,255,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
  }
  .spinner { width: 48px; height: 48px; border: 5px solid #e2e8f0; border-top-color: var(--prox); border-radius: 50%; animation: spin 0.7s linear infinite; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 14px 28px;
    border-radius: 99px; font-size: 15px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 8000;
    white-space: nowrap; animation: fadeUp 0.3s ease;
  }
  .toast.ok    { background: var(--success); }
  .toast.error { background: var(--hoy); }

  .empty-right {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; color:var(--muted);
  }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes pulse  { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
  @keyframes fadeUp { from{ opacity:0; transform:translate(-50%,16px); } to{ opacity:1; transform:translate(-50%,0); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div style="font-size:16px;font-weight:700;color:#64748b;">Cargando...</div></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div style="font-size:56px;">🧾</div>
  <div style="font-size:28px;font-weight:900;">Facturación ML</div>
  <div style="font-size:15px;color:#64748b;margin-bottom:12px;">Identificate para continuar</div>
  <button class="login-btn a" onclick="login('A')">Soy A</button>
  <button class="login-btn c" style="margin-top:10px;" onclick="login('C')">Soy C</button>
</div>

<!-- APP -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="conn-dot" id="connDot"></div>
    <div class="topbar-title">🧾 Facturación ML</div>
    <div id="iaChip" style="display:none;font-size:12px;font-weight:700;color:var(--manana);">⏳ IA...</div>
    <div id="userChip" class="user-chip">A</div>
  </div>

  <div class="body">

    <!-- PANEL IZQUIERDO -->
    <div class="panel-left">
      <div class="left-search">
        <input id="searchInput" placeholder="🔍 Buscar cliente..." oninput="filtrar()" />
      </div>
      <div id="pedidosList"></div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel-right" style="position:relative;">

      <!-- Sin selección -->
      <div class="no-sel" id="noSel">
        <div class="icon">👈</div>
        <p>Seleccioná un pedido</p>
        <span style="font-size:14px;">Solo aparecen pedidos <strong>armados</strong></span>
      </div>

      <!-- Pedido abierto -->
      <div id="pedidoPanel">
        <div class="ped-header">
          <div class="ped-cliente" id="phCliente">—</div>
          <div class="ped-entrega" id="phEntrega">—</div>
          <div class="ped-meta"    id="phMeta">—</div>
          <div class="ped-chips"   id="phChips"></div>
        </div>

        <div class="ia-bar">
          <button class="btn-ia" onclick="iaVerificar()">🧠 Verificar con IA</button>
          <button class="btn-ia" onclick="marcarTodos()">✅ Todos OK</button>
          <button class="btn-ia" onclick="desmarcarTodos()" style="margin-left:auto;">↩ Desmarcar</button>
        </div>

        <div id="itemsPanel"></div>

        <div class="ped-footer">
          <div class="footer-stats">
            <span>📦 <span id="stTotal">0</span> items</span>
            <span class="ok-count">✅ <span id="stOk">0</span> facturados</span>
            <span class="flt-count">❌ <span id="stFalt">0</span> faltantes</span>
          </div>
          <div class="footer-actions">
            <button class="btn-wa" onclick="enviarWA()" title="WhatsApp faltantes">💬</button>
            <button class="btn-facturar" id="btnFacturar" disabled onclick="facturarPedido()">
              ✅ FACTURADO COMPLETO
            </button>
          </div>
        </div>
      </div>

      <!-- Panel IA flotante -->
      <div id="iaPanel">
        <div class="ia-head">
          <span>🧠 Análisis IA</span>
          <button class="btn-close" onclick="cerrarIA()">✕</button>
        </div>
        <div class="ia-body" id="iaBody">Analizando...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL  = "https://gjeyvbidomxzofcdycya.supabase.co";
const SUPABASE_ANON = "sb_publishable_CjdA8GwtCljm_PzT8pqk3g_QIhTmUHT";
const WORKER_URL    = "https://frosty-term-20ea.santamariapablodaniel.workers.dev";

let currentUser  = null;
let pedidosAll   = [];
let pedidoActivo = null;
let itemsActivos = [];

// ── FECHAS ──
function hoyISO()    { return new Date().toISOString().split("T")[0]; }
function mananaISO() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split("T")[0]; }
function viernesISO() {
  const hoy = new Date(), diff = 5 - hoy.getDay();
  const v = new Date(hoy); v.setDate(hoy.getDate() + (diff >= 0 ? diff : diff + 7));
  return v.toISOString().split("T")[0];
}

function grupoFecha(fe) {
  if (!fe) return "prox";
  if (fe <= hoyISO())    return "hoy";
  if (fe <= mananaISO()) return "man";
  return "prox";
}

function fmtFecha(fe) {
  if (!fe) return "—";
  return new Date(fe + "T12:00:00").toLocaleDateString("es-AR", { weekday:"short", day:"2-digit", month:"2-digit" });
}

// ── SUPABASE ──
async function sbGet(table, params="") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  return r.ok ? r.json() : [];
}
async function sbPatch(table, match, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {
    method: "PATCH",
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=representation" },
    body: JSON.stringify(data)
  });
  return r.ok ? r.json() : null;
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(data)
  });
  return r.ok;
}

// ── REALTIME ──
function conectarRealtime() {
  const ws = new WebSocket(
    `${SUPABASE_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`
  );
  let hb;
  ws.onopen = () => {
    setConn("online");
    ["pedidos","items_pedido"].forEach((t,i) => ws.send(JSON.stringify({
      topic:`realtime:public:${t}`, event:"phx_join",
      payload:{ config:{ postgres_changes:[{ event:"*", schema:"public", table:t }] } }, ref: String(i+1)
    })));
    hb = setInterval(() => ws.readyState===1 && ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:"hb" })), 20000);
  };
  ws.onmessage = async (e) => {
    try {
      const msg = JSON.parse(e.data);
      const t = msg.payload?.data?.table;
      if (t === "pedidos") { await cargarPedidos(); renderLista(); }
      if (t === "items_pedido" && pedidoActivo) await recargarItems();
    } catch(_) {}
  };
  ws.onclose = () => { setConn("offline"); clearInterval(hb); setTimeout(conectarRealtime, 3000); };
  ws.onerror = () => setConn("offline");
}
function setConn(s) { const d=document.getElementById("connDot"); if(d) d.className="conn-dot "+s; }

// ── LOGIN ──
function login(user) {
  currentUser = user;
  localStorage.setItem("factUser", user);
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("app").style.flexDirection = "column";
  document.getElementById("app").style.height = "100vh";
  document.getElementById("userChip").textContent = user;
  iniciarApp();
}

// ── CARGA PEDIDOS ──
async function cargarPedidos() {
  setConn("syncing");
  try {
    pedidosAll = await sbGet("pedidos",
      "estado=in.(armado,en_facturacion,facturado)&order=fecha_entrega.asc,created_at.asc&limit=200");
    setConn("online");
  } catch(e) { setConn("offline"); }
}

// ── RENDER LISTA ──
function filtrar() { renderLista(); }

function renderLista() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const lista = pedidosAll.filter(p =>
    !q || (p.cliente_nombre||"").toLowerCase().includes(q) || String(p.cliente_id||"").includes(q)
  );

  const grupos = { hoy:[], man:[], prox:[] };
  lista.forEach(p => grupos[grupoFecha(p.fecha_entrega)].push(p));

  let html = "";

  const renderGrupo = (key, icon, label, color) => {
    if (!grupos[key].length) return "";
    html += `<div class="grupo-header ${key}">${icon} ${label} <span class="grupo-count">${grupos[key].length}</span></div>`;
    grupos[key].forEach(p => {
      const g = grupoFecha(p.fecha_entrega);
      const selClass = pedidoActivo?.id === p.id ? "selected" : "";
      const facClass = p.estado === "facturado" ? "facturado" : "";
      const fechaC   = g === "hoy" ? "hoy-c" : g === "man" ? "man-c" : "prox-c";
      html += `
        <div class="pedido-item grp-${key} ${selClass} ${facClass}" onclick="seleccionar('${p.id}')">
          <div class="pi-nombre">${p.cliente_nombre || "Cliente " + (p.cliente_id||"—")}</div>
          <div class="pi-fecha ${fechaC}">${icon} ${fmtFecha(p.fecha_entrega).toUpperCase()}</div>
          <div class="pi-meta">${p.vendedor||"—"} ${p.estado === "facturado" ? "· ✅ FACTURADO" : ""}</div>
        </div>`;
    });
  };

  renderGrupo("hoy",  "🔴", "HOY",           "var(--hoy)");
  renderGrupo("man",  "🟠", "MAÑANA",        "var(--manana)");
  renderGrupo("prox", "⏳", "PRÓXIMA SEMANA", "var(--prox)");

  document.getElementById("pedidosList").innerHTML = html || `<div style="padding:30px;text-align:center;color:var(--muted);font-size:14px;">Sin pedidos armados.</div>`;
}

// ── SELECCIONAR PEDIDO ──
async function seleccionar(id) {
  showLoader();
  try {
    const [ps, items] = await Promise.all([
      sbGet("pedidos", `id=eq.${id}`),
      sbGet("items_pedido", `pedido_id=eq.${id}&order=id.asc`)
    ]);
    pedidoActivo = ps[0];
    itemsActivos = items;

    // Pasar a en_facturacion si estaba armado
    if (pedidoActivo.estado === "armado") {
      await sbPatch("pedidos", `id=eq.${id}`, { estado: "en_facturacion" });
      pedidoActivo.estado = "en_facturacion";
      await cargarPedidos(); renderLista();
    }

    renderHeader();
    renderItemsF();

    document.getElementById("noSel").style.display = "none";
    const pp = document.getElementById("pedidoPanel");
    pp.style.display = "flex";
    pp.style.flexDirection = "column";
    pp.style.height = "100%";
  } catch(e) { toast("Error al cargar", "error"); }
  finally { hideLoader(); }
}

function renderHeader() {
  if (!pedidoActivo) return;
  const fe = pedidoActivo.fecha_entrega;
  const g  = grupoFecha(fe);
  const icon = g==="hoy" ? "🔴" : g==="man" ? "🟠" : "⏳";
  const eClass = g==="hoy" ? "hoy-e" : g==="man" ? "man-e" : "prox-e";
  const feStr = fe
    ? new Date(fe+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})
    : "—";

  document.getElementById("phCliente").textContent =
    pedidoActivo.cliente_nombre || "Cliente " + (pedidoActivo.cliente_id||"—");
  document.getElementById("phEntrega").textContent = `${icon} SE ENTREGA: ${feStr.toUpperCase()}`;
  document.getElementById("phEntrega").className = `ped-entrega ${eClass}`;
  document.getElementById("phMeta").textContent =
    `Vendedor: ${pedidoActivo.vendedor||"—"} · ${pedidoActivo.observaciones||"Sin observaciones"}`;
  document.getElementById("phChips").innerHTML = `
    <div class="chip">N° ${pedidoActivo.cliente_id||"—"}</div>
    ${pedidoActivo.estado==="facturado" ? `<div class="chip" style="color:var(--success);border-color:#86efac;">✅ FACTURADO</div>` : ""}
  `;
}

async function recargarItems() {
  if (!pedidoActivo) return;
  itemsActivos = await sbGet("items_pedido", `pedido_id=eq.${pedidoActivo.id}&order=id.asc`);
  renderItemsF();
}

function renderItemsF() {
  const box = document.getElementById("itemsPanel");
  box.innerHTML = itemsActivos.map((item, i) => {
    const isFact = item.facturado;
    const isFalt = item.es_faltante;
    const rowCls = isFact ? "ok" : isFalt ? "faltante" : "";
    const chkCls = isFact ? "ok" : isFalt ? "faltante" : "";
    const chkTxt = isFact ? "✓" : isFalt ? "✕" : "";
    const descCls = isFact ? "tachado" : "";
    const qty = item.cantidad_real ?? item.cantidad;
    const qtyMod = item.cantidad_real != null && item.cantidad_real !== item.cantidad ? "mod" : "";

    return `
      <div class="item-f ${rowCls}" id="ifrow-${item.id}">
        <button class="chk-f ${chkCls}" onclick="toggleFacturado('${item.id}',${i})">${chkTxt}</button>
        <div>
          <div class="item-f-desc ${descCls}" id="ifdesc-${item.id}">${item.descripcion}</div>
          ${item.facturado_por ? `<div class="item-f-who">✓ ${item.facturado_por} · ${fmtTime(item.facturado_at)}</div>` : ""}
        </div>
        <input class="qty-in ${qtyMod}" type="number" min="0" value="${qty}"
          id="qty-${item.id}" onchange="cambiarCantidad('${item.id}',${i},this.value)" />
        <button class="btn-falt ${isFalt?"activo":""}" onclick="toggleFaltante('${item.id}',${i})"
          title="Marcar faltante">⚠️</button>
      </div>`;
  }).join("");
  actualizarStats();
}

// ── ACCIONES ITEMS ──
async function toggleFacturado(itemId, idx) {
  const nuevo = !itemsActivos[idx].facturado;
  itemsActivos[idx].facturado = nuevo;
  if (nuevo) itemsActivos[idx].es_faltante = false;
  renderItemsF();
  const now = new Date().toISOString();
  await sbPatch("items_pedido", `id=eq.${itemId}`, {
    facturado: nuevo, facturado_por: nuevo ? currentUser : null,
    facturado_at: nuevo ? now : null, es_faltante: false
  });
}

async function toggleFaltante(itemId, idx) {
  const nuevo = !itemsActivos[idx].es_faltante;
  itemsActivos[idx].es_faltante = nuevo;
  if (nuevo) itemsActivos[idx].facturado = false;
  renderItemsF();
  await sbPatch("items_pedido", `id=eq.${itemId}`, { es_faltante: nuevo, facturado: false });
}

async function cambiarCantidad(itemId, idx, val) {
  const qty = parseFloat(val);
  if (isNaN(qty) || qty < 0) return;
  itemsActivos[idx].cantidad_real = qty;
  const input = document.getElementById(`qty-${itemId}`);
  input.classList.toggle("mod", qty !== itemsActivos[idx].cantidad);
  await sbPatch("items_pedido", `id=eq.${itemId}`, { cantidad_real: qty });
}

function marcarTodos() {
  const now = new Date().toISOString();
  itemsActivos.forEach(i => { i.facturado = true; i.es_faltante = false; });
  renderItemsF();
  Promise.all(itemsActivos.map(i => sbPatch("items_pedido", `id=eq.${i.id}`, {
    facturado: true, facturado_por: currentUser, facturado_at: now, es_faltante: false
  })));
}

function desmarcarTodos() {
  itemsActivos.forEach(i => { i.facturado = false; });
  renderItemsF();
  Promise.all(itemsActivos.map(i => sbPatch("items_pedido", `id=eq.${i.id}`, { facturado: false })));
}

function actualizarStats() {
  const total = itemsActivos.length;
  const ok    = itemsActivos.filter(i => i.facturado).length;
  const falt  = itemsActivos.filter(i => i.es_faltante).length;
  document.getElementById("stTotal").textContent = total;
  document.getElementById("stOk").textContent    = ok;
  document.getElementById("stFalt").textContent  = falt;

  const btn = document.getElementById("btnFacturar");
  const listos = ok + falt;
  if (pedidoActivo?.estado === "facturado") {
    btn.disabled = true; btn.textContent = "✅ YA FACTURADO";
  } else {
    btn.disabled = listos < total;
    btn.textContent = falt > 0
      ? `✅ FACTURADO (${falt} faltante${falt>1?"s":""})`
      : "✅ FACTURADO COMPLETO";
  }
}

// ── FACTURAR ──
async function facturarPedido() {
  if (!pedidoActivo) return;
  showLoader();
  try {
    await sbPatch("pedidos", `id=eq.${pedidoActivo.id}`, { estado: "facturado" });
    await sbInsert("auditoria", {
      pedido_id: pedidoActivo.id, accion: "pedido_facturado", usuario: currentUser,
      detalle: { ok: itemsActivos.filter(i=>i.facturado).length, faltantes: itemsActivos.filter(i=>i.es_faltante).length }
    });
    pedidoActivo.estado = "facturado";
    renderHeader(); actualizarStats();
    await cargarPedidos(); renderLista();
    toast("¡Pedido facturado! ✅", "ok");
  } catch(e) { toast("Error al facturar", "error"); }
  finally { hideLoader(); }
}

// ── WHATSAPP ──
function enviarWA() {
  const faltantes = itemsActivos.filter(i => i.es_faltante);
  if (!faltantes.length) { toast("No hay faltantes marcados."); return; }
  const lineas = faltantes.map(i => `• ${i.cantidad_real ?? i.cantidad} ${i.descripcion}`).join("\n");
  const msg = `Pedido de *${pedidoActivo.cliente_nombre || pedidoActivo.cliente_id}*:\n\n*Faltantes para próximo reparto:*\n${lineas}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
}

// ── IA ──
async function iaVerificar() {
  if (!pedidoActivo || !itemsActivos.length) return;
  document.getElementById("iaChip").style.display = "block";
  const panel = document.getElementById("iaPanel");
  document.getElementById("iaBody").textContent = "Analizando...";
  panel.style.display = "flex";
  panel.style.flexDirection = "column";

  const lista = itemsActivos.map(i => `${i.cantidad} ${i.descripcion}`).join("\n");
  try {
    const r = await fetch(WORKER_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: `Revisá esta lista de pedido de ${pedidoActivo.cliente_nombre}:\n\n${lista}\n\n¿Hay cantidades inusuales, errores de tipeo, o algo raro?`,
        sys: "Sos un asistente de control de facturación. Revisá listas de productos y detectá errores, cantidades inusuales o inconsistencias. Respondé en español, conciso y directo. Usá emojis para señalar problemas."
      })
    });
    const d = await r.json();
    document.getElementById("iaBody").textContent = d.text || "No se pudo analizar.";
  } catch(e) {
    document.getElementById("iaBody").textContent = "Error al conectar con la IA.";
  }
  document.getElementById("iaChip").style.display = "none";
}

function cerrarIA() { document.getElementById("iaPanel").style.display = "none"; }

// ── UTILS ──
function fmtTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
}
function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }
let tt;
function toast(msg, tipo="") {
  const old = document.querySelector(".toast"); if(old) old.remove();
  const el = document.createElement("div");
  el.className = `toast ${tipo}`;
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(tt);
  tt = setTimeout(() => el.remove(), 2800);
}

// ── INIT ──
function iniciarApp() {
  cargarPedidos().then(() => renderLista());
  conectarRealtime();
  setInterval(() => cargarPedidos().then(() => renderLista()), 30000);
}

window.onload = () => {
  hideLoader();
  const saved = localStorage.getItem("factUser");
  if (saved) login(saved);
  else document.getElementById("loginScreen").style.display = "flex";
};
</script>
