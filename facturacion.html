<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturación ML</title>
  <meta name="theme-color" content="#ffffff" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root {
    --hoy:       #dc2626;
    --hoy-bg:    #fef2f2;
    --hoy-brd:   #fca5a5;
    --manana:    #d97706;
    --man-bg:    #fffbeb;
    --man-brd:   #fcd34d;
    --prox:      #2563eb;
    --prox-bg:   #eff6ff;
    --prox-brd:  #93c5fd;
    --success:   #16a34a;
    --succ-bg:   #f0fdf4;
    --danger:    #dc2626;
    --bg:        #f1f5f9;
    --card:      #ffffff;
    --text:      #0f172a;
    --muted:     #64748b;
    --border:    #e2e8f0;
    --radius:    14px;
    --shadow:    0 2px 12px rgba(0,0,0,0.07);
    --left-w:    340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 20px; background: #fff;
  }
  .login-btn {
    width: 220px; padding: 18px; border-radius: var(--radius);
    border: none; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.15s;
  }
  .login-btn.a { background: var(--hoy);  color: #fff; }
  .login-btn.c { background: var(--prox); color: #fff; }
  .login-btn:active { transform: scale(0.97); }

  /* ── LAYOUT ── */
  #app { display: none; height: 100vh; flex-direction: column; }

  .topbar {
    height: 56px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(226,232,240,0.7);
    display: flex; align-items: center; padding: 0 20px; gap: 14px;
    flex-shrink: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); z-index: 100;
  }
  .topbar-title { font-size: 20px; font-weight: 900; flex: 1; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #dc2626; }
  .conn-dot.online  { background: var(--success); box-shadow: 0 0 0 3px #bbf7d0; }
  .conn-dot.syncing { background: var(--manana); animation: pulse 1s infinite; }
  .user-chip {
    background: var(--hoy); color: #fff;
    padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 900;
  }

  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── PANEL IZQUIERDO ── */
  .panel-left {
    width: var(--left-w); flex-shrink: 0;
    background: var(--card); border-right: 2px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .left-search { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .left-search input {
    width: 100%; padding: 10px 14px; border-radius: 99px;
    border: 2px solid var(--border); font-size: 14px; outline: none;
    background: var(--bg); color: var(--text);
  }
  .left-search input:focus { border-color: var(--prox); }

  .grupo { flex-shrink: 0; }
  .grupo-header {
    padding: 10px 14px 8px;
    font-size: 12px; font-weight: 900; text-transform: uppercase;
    letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    z-index: 10; background: inherit;
  }
  .grupo-header.hoy   { background: var(--hoy-bg);  color: var(--hoy); border-left: 4px solid var(--hoy); }
  .grupo-header.man   { background: var(--man-bg);  color: var(--manana); border-left: 4px solid var(--manana); }
  .grupo-header.prox  { background: var(--prox-bg); color: var(--prox); border-left: 4px solid var(--prox); }
  .grupo-count {
    margin-left: auto; background: currentColor; color: #fff;
    border-radius: 99px; font-size: 11px; padding: 1px 8px; opacity: 0.85;
  }

  #pedidosList { flex: 1; overflow-y: auto; }
  #pedidosList::-webkit-scrollbar { width: 4px; }
  #pedidosList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pedido-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: 0.12s;
    border-left: 4px solid transparent;
  }
  .pedido-item:hover { background: var(--bg); }
  .pedido-item.selected { background: #eff6ff; border-left-color: var(--prox); }
  .pedido-item.grp-hoy.selected  { background: var(--hoy-bg); border-left-color: var(--hoy); }
  .pedido-item.grp-man.selected  { background: var(--man-bg); border-left-color: var(--manana); }
  .pedido-item.facturado         { opacity: 0.5; }

  .pi-nombre { font-size: 15px; font-weight: 800; color: var(--text); }
  .pi-fecha  { font-size: 13px; font-weight: 600; margin-top: 3px; }
  .pi-fecha.hoy-c  { color: var(--hoy); }
  .pi-fecha.man-c  { color: var(--manana); }
  .pi-fecha.prox-c { color: var(--prox); }
  .pi-meta   { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pi-prog   { height: 4px; background: rgba(0,0,0,0.07); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .pi-prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* ── PANEL DERECHO ── */
  .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .no-sel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; color: var(--muted);
  }
  .no-sel .icon { font-size: 64px; }
  .no-sel p { font-size: 20px; font-weight: 700; }

  #pedidoPanel { display: none; flex-direction: column; height: 100%; }

  /* Header del pedido */
  .ped-header {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(226,232,240,0.7);
    padding: 20px 24px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .ped-cliente { font-size: 32px; font-weight: 900; color: var(--text); line-height: 1.1; }
  .ped-entrega {
    font-size: 20px; font-weight: 800; margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .ped-entrega.hoy-e   { color: var(--hoy); }
  .ped-entrega.man-e   { color: var(--manana); }
  .ped-entrega.prox-e  { color: var(--prox); }
  .ped-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .ped-chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .chip {
    background: var(--bg); border: 2px solid var(--border);
    padding: 5px 12px; border-radius: 99px; font-size: 13px;
    font-weight: 600; color: var(--muted);
  }

  /* Toolbar IA */
  .ia-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; gap: 8px; flex-shrink: 0;
  }
  .btn-ia {
    background: var(--bg); border: 2px solid var(--border);
    color: var(--muted); padding: 8px 16px; border-radius: 99px;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.12s;
  }
  .btn-ia:hover { border-color: var(--prox); color: var(--prox); }

  /* Lista items */
  #itemsPanel { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  #itemsPanel::-webkit-scrollbar { width: 4px; }
  #itemsPanel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item-f {
    background: #fff; border: 2px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: grid; grid-template-columns: 54px 1fr 90px 54px;
    align-items: center; gap: 14px; box-shadow: var(--shadow);
    transition: 0.12s;
  }
  .item-f.ok       { border-color: #86efac; background: var(--succ-bg); }
  .item-f.faltante { border-color: var(--hoy-brd); background: var(--hoy-bg); }
  .item-f:hover { border-color: #cbd5e1; }

  .chk-f {
    width: 50px; height: 50px; border-radius: 12px;
    border: 3px solid var(--border); background: #fff;
    font-size: 24px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.12s; flex-shrink: 0;
  }
  .chk-f.ok       { background: var(--success); border-color: var(--success); color: #fff; }
  .chk-f.faltante { background: var(--hoy-bg); border-color: var(--hoy); color: var(--hoy); }
  .chk-f:active   { transform: scale(0.87); }

  .item-f-desc { font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .item-f-desc.tachado { text-decoration: line-through; color: var(--muted); }
  .item-f-who  { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .qty-in {
    width: 80px; border: 2px solid var(--border); border-radius: 10px;
    padding: 10px 8px; font-size: 20px; font-weight: 900;
    text-align: center; background: var(--bg); color: var(--text); outline: none;
  }
  .qty-in:focus { border-color: var(--prox); background: #fff; }
  .qty-in.mod   { border-color: var(--manana); color: var(--manana); }

  .btn-falt {
    width: 46px; height: 46px; border-radius: 10px;
    border: 2px solid var(--border); background: #fff;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: 0.12s; flex-shrink: 0;
  }
  .btn-falt:hover { border-color: var(--hoy); background: var(--hoy-bg); }
  .btn-falt.activo { border-color: var(--hoy); background: var(--hoy-bg); }

  /* Footer */
  .ped-footer {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(226,232,240,0.7);
    padding: 16px 24px; flex-shrink: 0;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
  }
  .footer-stats {
    display: flex; gap: 20px; margin-bottom: 12px;
    font-size: 14px; font-weight: 700; color: var(--muted);
  }
  .footer-stats .ok-count  { color: var(--success); }
  .footer-stats .flt-count { color: var(--hoy); }
  .footer-actions { display: flex; gap: 12px; }

  .btn-facturar {
    flex: 1; padding: 18px; border-radius: 99px;
    border: none; font-size: 18px; font-weight: 900;
    background: var(--success); color: #fff; cursor: pointer;
    transition: 0.15s; box-shadow: 0 4px 16px rgba(22,163,74,0.35);
  }
  .btn-facturar:disabled {
    background: #d1fae5; color: #6ee7b7; cursor: not-allowed; box-shadow: none;
  }
  .btn-facturar:not(:disabled):active { transform: scale(0.98); }

  .btn-wa {
    padding: 18px 20px; border-radius: 99px;
    border: 2px solid var(--border); background: #fff;
    font-size: 18px; cursor: pointer; font-weight: 700; color: var(--muted);
    transition: 0.15s;
  }
  .btn-wa:hover { border-color: #25D366; color: #25D366; }

  /* Panel IA flotante */
  #iaPanel {
    display: none; position: absolute;
    right: 20px; top: 80px; width: 360px;
    background: #fff; border: 2px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 200; flex-direction: column; max-height: calc(100vh - 120px);
  }
  .ia-head {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 800;
  }
  .ia-body { padding: 18px; overflow-y: auto; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }

  /* LOADER / TOAST */
  #loader {
    position: fixed; inset: 0; background: rgba(255,255,255,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
  }
  .spinner { width: 48px; height: 48px; border: 5px solid #e2e8f0; border-top-color: var(--prox); border-radius: 50%; animation: spin 0.7s linear infinite; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 14px 28px;
    border-radius: 99px; font-size: 15px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 8000;
    white-space: nowrap; animation: fadeUp 0.3s ease;
  }
  .toast.ok    { background: var(--success); }
  .toast.error { background: var(--hoy); }

  .empty-right {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; color:var(--muted);
  }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes pulse  { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
  @keyframes fadeUp { from{ opacity:0; transform:translate(-50%,16px); } to{ opacity:1; transform:translate(-50%,0); } }

  /* ── LEFT TABS ── */
  .left-tabs-bar { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 2px solid var(--border); flex-shrink: 0; }
  .ltab { padding: 12px 8px; font-size: 13px; font-weight: 800; border: none; background: transparent; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; transition: .15s; }
  .ltab.active { color: var(--prox); border-bottom-color: var(--prox); background: var(--prox-bg); }
  #pedidosView, #historialView { flex-direction: column; flex: 1; overflow: hidden; }
  #historialList { flex: 1; overflow-y: auto; }
  #historialList::-webkit-scrollbar { width: 4px; }
  #historialList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .hist-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.12s; }
  .hist-item:hover { background: var(--bg); }
  .hist-nombre { font-size: 14px; font-weight: 800; color: var(--text); }
  .hist-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── MODALES ── */
  .modal-over { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 8000; backdrop-filter: blur(3px); }
  .modal-box { background: #fff; border-radius: 24px 24px 0 0; padding: 28px 24px 36px; width: 100%; max-width: 520px; animation: slideUp .2s ease; }
  .modal-box.notas-box { max-height: 72vh; display: flex; flex-direction: column; padding-bottom: 24px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  .modal-input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 18px; font-weight: 700; outline: none; color: var(--text); margin-bottom: 14px; }
  .modal-input:focus { border-color: var(--prox); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-btns.solo { grid-template-columns: 1fr; }
  .modal-btn { padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; transition: .15s; }
  .modal-btn.ok { background: var(--prox); color: #fff; }
  .modal-btn.cancel { background: var(--bg); border: 2px solid var(--border); color: var(--muted); }
  .modal-btn:active { transform: scale(.97); }

  /* Notas modal */
  .notas-lista-modal { flex: 1; overflow-y: auto; margin: 12px 0; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
  .nota-modal-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
  .nota-modal-txt { font-size: 14px; color: var(--text); line-height: 1.4; }
  .nota-modal-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .nota-input-modal { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; color: var(--text); margin-bottom: 12px; flex-shrink: 0; }
  .nota-input-modal:focus { border-color: var(--prox); }

  /* Botón notas en header */
  .btn-notas-open { background: var(--bg); border: 2px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 99px; font-size: 13px; font-weight: 700; cursor: pointer; transition: .15s; margin-top: 10px; }
  .btn-notas-open:hover { border-color: var(--manana); color: var(--manana); }
  .btn-notas-open.tiene-notas { border-color: var(--manana); color: var(--manana); background: var(--man-bg); }

  /* N° cliente grande */
  .ped-num-grande { font-size: 38px; font-weight: 900; color: var(--prox); line-height: 1; letter-spacing: -1px; }

  /* Faltantes previos */
  .faltantes-previos-sec { background: #fffbeb; border-left: 6px solid #f59e0b; border-radius: 0; padding: 12px 24px; flex-shrink: 0; }
  .faltantes-previos-title { font-size: 13px; font-weight: 900; color: #92400e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
  .faltante-prev-item { font-size: 14px; font-weight: 700; color: var(--text); padding: 4px 0; border-bottom: 1px solid #fde68a; display: flex; gap: 10px; }
  .faltante-prev-item:last-child { border-bottom: none; }
  .faltante-prev-qty { color: var(--manana); min-width: 32px; font-weight: 900; }

  /* Mensaje motivacional */
  #msgMot { font-size: 13px; color: var(--muted); text-align: center; padding: 2px 0 6px; font-style: italic; min-height: 20px; }

  /* Tab A armar */
  #armarList { flex: 1; overflow-y: auto; }
  #armarList::-webkit-scrollbar { width: 4px; }
  #armarList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .pend-armar-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .pend-armar-num { font-size: 18px; font-weight: 900; color: var(--prox); }
  .pend-armar-nombre { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .pend-armar-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pend-armar-fecha.hoy-c  { color: var(--hoy);    font-weight: 800; font-size: 12px; }
  .pend-armar-fecha.man-c  { color: var(--manana); font-weight: 800; font-size: 12px; }
  .pend-armar-fecha.prox-c { color: var(--prox);   font-weight: 700; font-size: 12px; }

  /* ── RESPONSIVE ── */
  @media(max-width:1000px){ :root{ --left-w: 280px; } }
  @media(max-width:780px) { :root{ --left-w: 240px; } .item-f{ grid-template-columns: 46px 1fr 70px 44px; gap: 10px; padding: 12px 14px; } }
  @media(max-width:620px) {
    .body { flex-direction: column; }
    .panel-left { width: 100%; height: 220px; border-right: none; border-bottom: 2px solid var(--border); }
    #pedidosList { overflow-y: auto; }
    .panel-right { overflow-y: auto; }
  }

  @keyframes slideUp  { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── TRANSICIONES ── */
  .pedido-item { transition: background .12s, border-color .12s; }
  .item-f      { transition: background .15s, border-color .15s, box-shadow .15s; }
  .item-f:hover{ box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .ltab        { transition: color .15s, border-color .15s, background .15s; }
  .btn-facturar{ transition: background .15s, transform .1s, box-shadow .15s, opacity .15s; }
  .chk-f       { transition: background .12s, border-color .12s, transform .1s; }
  .btn-notas-open { transition: border-color .15s, color .15s, background .15s; }

  /* ── DARK MODE ── */
  @media(prefers-color-scheme:dark){
    :root{
      --hoy:       #f87171; --hoy-bg:  #2d1414; --hoy-brd:  #7f1d1d;
      --manana:    #fbbf24; --man-bg:  #292008; --man-brd:  #78350f;
      --prox:      #60a5fa; --prox-bg: #1b2d4a; --prox-brd: #1e3a6e;
      --success:   #4ade80; --succ-bg: #14271a;
      --bg:        #12151c; --card:    #1e2330;
      --text:      #eef2f7; --muted:   #8090a8; --border:   #2d3a4e;
      --shadow:    0 2px 14px rgba(0,0,0,.4);
      --left-w:    340px;
    }
    html,body { background:var(--bg); color:var(--text); }
    .topbar,.ped-header,.ped-footer { background:rgba(30,35,48,.9); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-color:rgba(45,58,78,.8); }
    .ia-bar { background:rgba(18,21,28,.85); border-color:var(--border); }
    .panel-left { background:var(--card); border-color:var(--border); }
    .panel-right { background:var(--bg); }
    .pedido-item:hover { background:#1a2030; }
    .pedido-item.selected { background:#1e2d4a; }
    .pedido-item.grp-hoy.selected { background:#2d1414; }
    .pedido-item.grp-man.selected { background:#292008; }

<script>
  window.SUPABASE_URL      = 'https://gjeyvbidomxzofcdycya.supabase.co';

<script>
// ── CONFIG ──
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON_KEY;
const WORKER_URL    = "https://frosty-term-20ea.santamariapablodaniel.workers.dev";

let currentUser  = null;
let pedidosAll   = [];
let pedidoActivo = null;
let itemsActivos = [];

// ── FECHAS ──
function hoyISO()    { return new Date().toISOString().split("T")[0]; }
function mananaISO() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split("T")[0]; }
function viernesISO() {
  const hoy = new Date(), diff = 5 - hoy.getDay();
  const v = new Date(hoy); v.setDate(hoy.getDate() + (diff >= 0 ? diff : diff + 7));
  return v.toISOString().split("T")[0];
}

function grupoFecha(fe) {
  if (!fe) return "prox";
  if (fe <= hoyISO())    return "hoy";
  if (fe <= mananaISO()) return "man";
  return "prox";
}

function fmtFecha(fe) {
  if (!fe) return "—";
  return new Date(fe + "T12:00:00").toLocaleDateString("es-AR", { weekday:"short", day:"2-digit", month:"2-digit" });
}

// ── SUPABASE ──
async function sbGet(table, params="") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  return r.ok ? r.json() : [];
}
async function sbPatch(table, match, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${match}`, {
    method: "PATCH",
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=representation" },
    body: JSON.stringify(data)
  });
  return r.ok ? r.json() : null;
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
      "Content-Type": "application/json", Prefer: "return=minimal" },
    body: JSON.stringify(data)
  });
  return r.ok;
}

// ── REALTIME ──
function conectarRealtime() {
  const ws = new WebSocket(
    `${SUPABASE_URL.replace("https://","wss://")}/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`
  );
  let hb;
  ws.onopen = () => {
    setConn("online");
    ["pedidos","items_pedido"].forEach((t,i) => ws.send(JSON.stringify({
      topic:`realtime:public:${t}`, event:"phx_join",
      payload:{ config:{ postgres_changes:[{ event:"*", schema:"public", table:t }] } }, ref: String(i+1)
    })));
    hb = setInterval(() => ws.readyState===1 && ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:"hb" })), 20000);
  };
  let _rtDebounce = null;
  ws.onmessage = async (e) => {
    try {
      const msg = JSON.parse(e.data);
      const t = msg.payload?.data?.table;
      if (t === "pedidos") {
        clearTimeout(_rtDebounce);
        _rtDebounce = setTimeout(async () => {
          const idsAntes = new Set(pedidosAll.map(p => p.id));
          await cargarPedidos(); // renderLista se llama dentro si hubo cambios
          const nuevos = pedidosAll.filter(p => !idsAntes.has(p.id) && p.estado === "armado");
          if (nuevos.length) {
            toast(`📦 Nuevo armado: ${nuevos[0].cliente_nombre || "N° "+nuevos[0].cliente_id}`, "ok");
          }
        }, 500);
      }
      if (t === "items_pedido" && pedidoActivo) await recargarItems();
    } catch(_) {}
  };
  ws.onclose = () => { setConn("offline"); clearInterval(hb); setTimeout(conectarRealtime, 3000); };
  ws.onerror = () => setConn("offline");
}
function setConn(s) { const d=document.getElementById("connDot"); if(d) d.className="conn-dot "+s; }

// ── CARGA PEDIDOS ──
let _pedidosHash = "";
async function cargarPedidos() {
  setConn("syncing");
  try {
    const data = await sbGet("pedidos",
      "estado=in.(armado,en_facturacion)&order=fecha_entrega.asc,created_at.asc&limit=200");
    setConn("online");
    const hash = JSON.stringify(data.map(p => p.id+"|"+p.estado));
    if (hash !== _pedidosHash) {
      _pedidosHash = hash;
      pedidosAll = data;
      renderLista();
    }
  } catch(e) { setConn("offline"); }
}

// ── RENDER LISTA ──
function filtrar() { renderLista(); }

function renderLista() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const lista = pedidosAll.filter(p =>
    !q || (p.cliente_nombre||"").toLowerCase().includes(q) || String(p.cliente_id||"").includes(q)
  );

  const grupos = { hoy:[], man:[], prox:[] };
  lista.forEach(p => grupos[grupoFecha(p.fecha_entrega)].push(p));

  let html = "";

  const renderGrupo = (key, icon, label, color) => {
    if (!grupos[key].length) return "";
    html += `<div class="grupo-header ${key}">${icon} ${label} <span class="grupo-count">${grupos[key].length}</span></div>`;
    grupos[key].forEach(p => {
      const g = grupoFecha(p.fecha_entrega);
      const selClass = pedidoActivo?.id === p.id ? "selected" : "";
      const facClass = p.estado === "facturado" ? "facturado" : "";
      const fechaC   = g === "hoy" ? "hoy-c" : g === "man" ? "man-c" : "prox-c";
      html += `
        <div class="pedido-item grp-${key} ${selClass} ${facClass}" onclick="seleccionar('${p.id}')" style="animation:fadeInUp .2s ease both">
          <div class="pi-nombre">${p.cliente_nombre || "Cliente " + (p.cliente_id||"—")}</div>
          <div class="pi-fecha ${fechaC}">${icon} ${fmtFecha(p.fecha_entrega).toUpperCase()}</div>
          <div class="pi-meta">${p.vendedor||"—"} ${p.estado === "facturado" ? "· ✅ FACTURADO" : ""}</div>
        </div>`;
    });
  };

  renderGrupo("hoy",  "🔴", "HOY",           "var(--hoy)");
  renderGrupo("man",  "🟠", "MAÑANA",        "var(--manana)");
  renderGrupo("prox", "⏳", "PRÓXIMA SEMANA", "var(--prox)");

  document.getElementById("pedidosList").innerHTML = html || `<div style="padding:30px;text-align:center;color:var(--muted);font-size:14px;">Sin pedidos armados.</div>`;
}

// ── SELECCIONAR PEDIDO ──
async function seleccionar(id) {
  showLoader();
  try {
    const [ps, items] = await Promise.all([
      sbGet("pedidos", `id=eq.${id}`),
      sbGet("items_pedido", `pedido_id=eq.${id}&order=id.asc`)
    ]);
    pedidoActivo = ps[0];
    itemsActivos = items;

    // Pasar a en_facturacion si estaba armado
    if (pedidoActivo.estado === "armado") {
      await sbPatch("pedidos", `id=eq.${id}`, { estado: "en_facturacion" });
      pedidoActivo.estado = "en_facturacion";
      await cargarPedidos(); renderLista();
    }

    renderHeader();
    renderItemsF();
    cargarNotas(pedidoActivo.cliente_id);
    cargarFaltantesPrevios(pedidoActivo.cliente_id, pedidoActivo.id);

    document.getElementById("noSel").style.display = "none";
    const pp = document.getElementById("pedidoPanel");
    pp.style.display = "flex";
    pp.style.flexDirection = "column";
    pp.style.height = "100%";
  } catch(e) { toast("Error al cargar", "error"); }
  finally { hideLoader(); }
}

function renderHeader() {
  if (!pedidoActivo) return;
  const fe = pedidoActivo.fecha_entrega;
  const g  = grupoFecha(fe);
  const icon = g==="hoy" ? "🔴" : g==="man" ? "🟠" : "⏳";
  const eClass = g==="hoy" ? "hoy-e" : g==="man" ? "man-e" : "prox-e";
  const feStr = fe
    ? new Date(fe+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})
    : "—";

  document.getElementById("phNumGrande").textContent = `N° ${pedidoActivo.cliente_id||"—"}`;
  document.getElementById("phCliente").textContent =
    pedidoActivo.cliente_nombre || "Cliente " + (pedidoActivo.cliente_id||"—");
  document.getElementById("phEntrega").textContent = `${icon} SE ENTREGA: ${feStr.toUpperCase()}`;
  document.getElementById("phEntrega").className = `ped-entrega ${eClass}`;
  document.getElementById("phMeta").textContent =
    `Vendedor: ${pedidoActivo.vendedor||"—"} · ${pedidoActivo.observaciones||"Sin observaciones"}`;
  document.getElementById("phChips").innerHTML = `
    ${pedidoActivo.armado_por ? `<div class="chip" style="color:var(--prox);border-color:#93c5fd;">🧑‍🏭 ${pedidoActivo.armado_por}</div>` : ""}
    ${pedidoActivo.estado==="facturado" ? `<div class="chip" style="color:var(--success);border-color:#86efac;">✅ FACTURADO</div>` : ""}
  `;
}

async function recargarItems() {
  if (!pedidoActivo) return;
  itemsActivos = await sbGet("items_pedido", `pedido_id=eq.${pedidoActivo.id}&order=id.asc`);
  renderItemsF();
}

function renderItemsF() {
  const box = document.getElementById("itemsPanel");
  box.innerHTML = itemsActivos.map((item, i) => {
    const isFact = item.facturado;
    const isFalt = item.es_faltante;
    const rowCls = isFact ? "ok" : isFalt ? "faltante" : "";
    const chkCls = isFact ? "ok" : isFalt ? "faltante" : "";
    const chkTxt = isFact ? "✓" : isFalt ? "✕" : "";
    const descCls = isFact ? "tachado" : "";
    const qty = item.cantidad_real ?? item.cantidad;
    const qtyMod = item.cantidad_real != null && item.cantidad_real !== item.cantidad ? "mod" : "";

    return `
      <div class="item-f ${rowCls}" id="ifrow-${item.id}" style="animation:fadeInUp .18s ease ${i*35}ms both">
        <button class="chk-f ${chkCls}" onclick="toggleFacturado('${item.id}',${i})">${chkTxt}</button>
        <div>
          <div class="item-f-desc ${descCls}" id="ifdesc-${item.id}">${item.descripcion}</div>
          ${item.facturado_por ? `<div class="item-f-who">✓ ${item.facturado_por} · ${fmtTime(item.facturado_at)}</div>` : ""}
        </div>
        <input class="qty-in ${qtyMod}" type="number" min="0" value="${qty}"
          id="qty-${item.id}" onchange="cambiarCantidad('${item.id}',${i},this.value)" />
        <button class="btn-falt ${isFalt?"activo":""}" onclick="toggleFaltante('${item.id}',${i})"
          title="Marcar faltante">⚠️</button>
      </div>`;
  }).join("");
  actualizarStats();
}

// ── ACCIONES ITEMS ──
async function toggleFacturado(itemId, idx) {
  const nuevo = !itemsActivos[idx].facturado;
  itemsActivos[idx].facturado = nuevo;
  if (nuevo) itemsActivos[idx].es_faltante = false;
  renderItemsF();
  const now = new Date().toISOString();
  await sbPatch("items_pedido", `id=eq.${itemId}`, {
    facturado: nuevo, facturado_por: nuevo ? currentUser : null,
    facturado_at: nuevo ? now : null, es_faltante: false
  });
}

async function toggleFaltante(itemId, idx) {
  const nuevo = !itemsActivos[idx].es_faltante;
  itemsActivos[idx].es_faltante = nuevo;
  if (nuevo) itemsActivos[idx].facturado = false;
  renderItemsF();
  await sbPatch("items_pedido", `id=eq.${itemId}`, { es_faltante: nuevo, facturado: false });
}

async function cambiarCantidad(itemId, idx, val) {
  const qty = parseFloat(val);
  if (isNaN(qty) || qty < 0) return;
  itemsActivos[idx].cantidad_real = qty;
  const input = document.getElementById(`qty-${itemId}`);
  input.classList.toggle("mod", qty !== itemsActivos[idx].cantidad);
  await sbPatch("items_pedido", `id=eq.${itemId}`, { cantidad_real: qty });
}

function marcarTodos() {
  const now = new Date().toISOString();
  itemsActivos.forEach(i => { i.facturado = true; i.es_faltante = false; });
  renderItemsF();
  Promise.all(itemsActivos.map(i => sbPatch("items_pedido", `id=eq.${i.id}`, {
    facturado: true, facturado_por: currentUser, facturado_at: now, es_faltante: false
  })));
}

function desmarcarTodos() {
  itemsActivos.forEach(i => { i.facturado = false; });
  renderItemsF();
  Promise.all(itemsActivos.map(i => sbPatch("items_pedido", `id=eq.${i.id}`, { facturado: false })));
}

const MSGS_MOT = [
  "Tomá tu tiempo, revisá cada artículo",
  "Revisa bien, sin apuros",
  "Lee con cuidado, no te apresures",
  "Presta atención a las cantidades",
  "Un error ahora es un problema después",
];
function actualizarStats() {
  const total = itemsActivos.length;
  const ok    = itemsActivos.filter(i => i.facturado).length;
  const falt  = itemsActivos.filter(i => i.es_faltante).length;
  document.getElementById("stTotal").textContent = total;
  document.getElementById("stOk").textContent    = ok;
  document.getElementById("stFalt").textContent  = falt;

  const faltSpan = document.getElementById("stFaltSpan");
  faltSpan.style.display = falt > 0 ? "inline" : "none";

  // Mensaje motivacional según progreso
  const msgEl = document.getElementById("msgMot");
  const listos = ok + falt;
  if (total === 0) {
    msgEl.textContent = "";
  } else if (listos === total) {
    msgEl.textContent = ok === total ? "✓ Todo facturado — revisá una vez más antes de confirmar" : "";
  } else {
    msgEl.textContent = MSGS_MOT[ok % MSGS_MOT.length];
  }

  const btn = document.getElementById("btnFacturar");
  if (pedidoActivo?.estado === "facturado") {
    btn.disabled = true; btn.textContent = "✅ YA FACTURADO";
  } else {
    btn.disabled = listos < total;
    btn.textContent = falt > 0
      ? `✅ FACTURADO (${falt} faltante${falt>1?"s":""})`
      : "✅ FACTURADO COMPLETO";
  }
}

// ── FACTURAR ──
async function facturarPedido() {
  if (!pedidoActivo) return;
  showLoader();
  try {
    await sbPatch("pedidos", `id=eq.${pedidoActivo.id}`, { estado: "facturado" });
    await sbInsert("auditoria", {
      pedido_id: pedidoActivo.id, accion: "pedido_facturado", usuario: currentUser,
      detalle: { ok: itemsActivos.filter(i=>i.facturado).length, faltantes: itemsActivos.filter(i=>i.es_faltante).length }
    });
    pedidoActivo.estado = "facturado";
    renderHeader(); actualizarStats();
    await cargarPedidos(); renderLista();
    toast("¡Pedido facturado! ✅", "ok");
  } catch(e) { toast("Error al facturar", "error"); }
  finally { hideLoader(); }
}

// ── WHATSAPP ──
function enviarWA() {
  const faltantes = itemsActivos.filter(i => i.es_faltante);
  if (!faltantes.length) { toast("No hay faltantes marcados."); return; }
  const lineas = faltantes.map(i => `• ${i.cantidad_real ?? i.cantidad} ${i.descripcion}`).join("\n");
  const msg = `Pedido de *${pedidoActivo.cliente_nombre || pedidoActivo.cliente_id}*:\n\n*Faltantes para próximo reparto:*\n${lineas}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
}


// ── LEFT TABS ──
function setLeftTab(tab) {
  document.getElementById("ltabPedidos").classList.toggle("active",   tab==="pedidos");
  document.getElementById("ltabArmar").classList.toggle("active",     tab==="armar");
  document.getElementById("ltabHistorial").classList.toggle("active", tab==="historial");
  document.getElementById("pedidosView").style.display   = tab==="pedidos"   ? "flex" : "none";
  document.getElementById("armarView").style.display     = tab==="armar"     ? "flex" : "none";
  document.getElementById("historialView").style.display = tab==="historial" ? "flex" : "none";
  if (tab === "armar") cargarPendientesArmar();
}

// ── HISTORIAL ──
async function buscarHistorial() {
  const q   = document.getElementById("histSearch").value.trim();
  const box = document.getElementById("historialList");
  if (!q) {
    box.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">Ingresá un Nº de cliente.</div>`;
    return;
  }
  const results = await sbGet("pedidos",
    `cliente_id=eq.${encodeURIComponent(q)}&estado=eq.facturado&order=fecha_entrega.desc&limit=50`);
  if (!results.length) {
    box.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">Sin pedidos facturados para ese cliente.</div>`;
    return;
  }
  box.innerHTML = results.map(p => `
    <div class="hist-item" onclick="seleccionar('${p.id}');setLeftTab('pedidos')">
      <div class="hist-nombre">${p.cliente_nombre||"Cliente "+p.cliente_id}</div>
      <div class="hist-meta">N° ${p.cliente_id||"—"} · ${fmtFecha(p.fecha_entrega)} · ✅ FACTURADO</div>
    </div>`).join("");
}

// ── NOTAS CLIENTE ──
let notasClienteId = null;
let notasCache     = [];

async function cargarNotas(clienteId) {
  notasClienteId = clienteId || null;
  const btn = document.getElementById("btnNotas");
  if (!clienteId) { btn.style.display = "none"; return; }
  notasCache = await sbGet("notas_cliente",
    `cliente_id=eq.${encodeURIComponent(clienteId)}&order=created_at.desc&limit=30`);
  btn.style.display = "inline-block";
  btn.textContent = notasCache.length
    ? `📝 Notas (${notasCache.length})`
    : "📝 Notas";
  btn.className = "btn-notas-open" + (notasCache.length ? " tiene-notas" : "");
}

function abrirModalNotas() {
  if (!notasClienteId) return;
  document.getElementById("notasModalCliente").textContent =
    pedidoActivo?.cliente_nombre || "N° " + notasClienteId;
  renderNotasModal();
  document.getElementById("modalNotas").style.display = "flex";
  setTimeout(() => document.getElementById("notaInputModal").focus(), 150);
}

function cerrarModalNotas() {
  document.getElementById("modalNotas").style.display = "none";
  document.getElementById("notaInputModal").value = "";
}

function renderNotasModal() {
  const box = document.getElementById("notasModalList");
  if (!notasCache.length) {
    box.innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">Sin notas todavía.</div>`;
    return;
  }
  box.innerHTML = notasCache.map(n => `
    <div class="nota-modal-item">
      <div class="nota-modal-txt">${escHtml(n.nota)}</div>
      <div class="nota-modal-meta">${n.created_by||"—"} · ${fmtNotaFecha(n.created_at)}</div>
    </div>`).join("");
}

async function guardarNota() {
  const txt = document.getElementById("notaInputModal").value.trim();
  if (!txt || !notasClienteId) return;
  document.getElementById("notaInputModal").value = "";
  await sbInsert("notas_cliente", { cliente_id: notasClienteId, nota: txt, created_by: currentUser });
  await cargarNotas(notasClienteId);
  renderNotasModal();
  toast("Nota guardada ✓", "ok");
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function fmtNotaFecha(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleString("es-AR", { day:"2-digit", month:"2-digit", year:"2-digit", hour:"2-digit", minute:"2-digit" });
}

// ── FALTANTES PREVIOS ──
async function cargarFaltantesPrevios(clienteId, pedidoActualId) {
  const sec = document.getElementById("faltantesPreviosSec");
  sec.style.display = "none";
  if (!clienteId) return;

  const hace15 = new Date();
  hace15.setDate(hace15.getDate() - 15);
  const hace15ISO = hace15.toISOString();

  try {
    // Buscar pedidos facturados del mismo cliente en últimos 15 días
    const previos = await sbGet("pedidos",
      `cliente_id=eq.${encodeURIComponent(clienteId)}&estado=eq.facturado&created_at=gte.${hace15ISO}&id=neq.${pedidoActualId}&order=created_at.desc&limit=3`);
    if (!previos.length) return;

    // Buscar items faltantes de esos pedidos
    const faltantes = [];
    for (const p of previos) {
      const items = await sbGet("items_pedido",
        `pedido_id=eq.${p.id}&es_faltante=eq.true`);
      faltantes.push(...items);
    }
    if (!faltantes.length) return;

    // Deduplicar por descripción
    const vistos = new Set();
    const unicos = faltantes.filter(f => {
      const k = f.descripcion.toLowerCase().trim();
      if (vistos.has(k)) return false;
      vistos.add(k); return true;
    });

    document.getElementById("faltantesPreviosList").innerHTML =
      unicos.map(f => `
        <div class="faltante-prev-item">
          <span class="faltante-prev-qty">${f.cantidad}</span>
          <span>${escHtml(f.descripcion)}</span>
        </div>`).join("");
    sec.style.display = "block";
  } catch(_) {}
}

// ── PENDIENTES DE ARMAR ──
async function cargarPendientesArmar() {
  const box = document.getElementById("armarList");
  box.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Cargando...</div>`;
  const pedidos = await sbGet("pedidos",
    "estado=eq.pendiente&order=fecha_entrega.asc,created_at.asc&limit=100");
  if (!pedidos.length) {
    box.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted);font-size:14px;">🎉 No hay pedidos pendientes de armar</div>`;
    return;
  }
  const grupos = { hoy:[], man:[], prox:[] };
  pedidos.forEach(p => grupos[grupoFecha(p.fecha_entrega)].push(p));

  let html = "";
  const renderGrp = (key, icon, label) => {
    if (!grupos[key].length) return;
    html += `<div class="grupo-header ${key}">${icon} ${label} <span class="grupo-count">${grupos[key].length}</span></div>`;
    grupos[key].forEach(p => {
      const fechaC = key==="hoy" ? "hoy-c" : key==="man" ? "man-c" : "prox-c";
      html += `<div class="pend-armar-item">
        <div class="pend-armar-num">N° ${p.cliente_id||"—"}</div>
        <div class="pend-armar-nombre">${p.cliente_nombre||"—"}</div>
        <div class="pend-armar-fecha ${fechaC}">${icon} ${fmtFecha(p.fecha_entrega)}</div>
        <div class="pend-armar-meta">Vendedor: ${p.vendedor||"—"}</div>
      </div>`;
    });
  };
  renderGrp("hoy",  "🔴", "HOY");
  renderGrp("man",  "🟠", "MAÑANA");
  renderGrp("prox", "⏳", "PRÓXIMA SEMANA");
  box.innerHTML = html;
}

// ── UTILS ──
function fmtTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
}
function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }
let tt;
function toast(msg, tipo="") {
  const old = document.querySelector(".toast"); if(old) old.remove();
  const el = document.createElement("div");
  el.className = `toast ${tipo}`;
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(tt);
  tt = setTimeout(() => el.remove(), 2800);
}

// ── NOMBRE USUARIO ──
function confirmarNombre() {
  const nombre = document.getElementById("modalNombreInput").value.trim();
  if (!nombre) { document.getElementById("modalNombreInput").focus(); return; }
  currentUser = nombre;
  localStorage.setItem("factUser", nombre);
  document.getElementById("userChip").textContent = nombre;
  document.getElementById("modalNombre").style.display = "none";
  iniciarApp();
}

function cambiarNombre() {
  document.getElementById("modalNombreInput").value = currentUser || "";
  document.getElementById("modalNombre").style.display = "flex";
  setTimeout(() => document.getElementById("modalNombreInput").select(), 100);
}

// ── INIT ──
function iniciarApp() {
  cargarPedidos(); // renderLista se llama dentro cuando llegan datos
  conectarRealtime();
  setInterval(cargarPedidos, 30000);
}

window.onload = () => {
  hideLoader();
  const saved = localStorage.getItem("factUser");
  if (saved) {
    currentUser = saved;
    document.getElementById("userChip").textContent = saved;
    document.getElementById("modalNombre").style.display = "none";
    iniciarApp();
  }
  // Si no hay nombre guardado, el modal ya está visible (display:flex en HTML)
};
</script>
